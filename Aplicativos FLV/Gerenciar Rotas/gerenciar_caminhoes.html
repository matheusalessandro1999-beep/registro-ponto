<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Caminhões - FLV</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
   /* ========== DESIGN PROFISSIONAL APRIMORADO - GERENCIAR CAMINHÕES ========== */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

:root {
    /* Cores Principais - Paleta Aprimorada com Melhor Contraste */
    --bg-primary: #ffffff;
    --bg-secondary: #f8fafc;
    --bg-tertiary: #f1f5f9;
    --bg-hover: #e2e8f0;
    
    /* Textos - Hierarquia com Mais Contraste */
    --text-primary: #0f172a;
    --text-secondary: #334155;
    --text-muted: #64748b;
    --text-light: #94a3b8;
    
    /* Bordas - Mais Definidas */
    --border-light: #cbd5e1;
    --border-medium: #94a3b8;
    --border-dark: #64748b;
    --border-strong: #475569;
    
    /* Accent - Verde Mais Vibrante */
    --accent-primary: #059669;
    --accent-primary-hover: #047857;
    --accent-primary-light: #d1fae5;
    --accent-subtle: #ecfdf5;
    
    /* Sombras - Mais Pronunciadas */
    --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.08);
    --shadow-sm: 0 2px 4px 0 rgba(0, 0, 0, 0.12);
    --shadow-md: 0 4px 8px -1px rgba(0, 0, 0, 0.15);
    --shadow-lg: 0 10px 20px -3px rgba(0, 0, 0, 0.18);
    --shadow-xl: 0 20px 30px -5px rgba(0, 0, 0, 0.22);
    
    /* Estados de Validação */
    --cor-erro: #fee2e2;
    --cor-erro-borda: #ef4444;
    --cor-erro-hover: #fecaca;
    --cor-valido: #d1fae5;
    --cor-valido-borda: #059669;
    
    /* Transições */
    --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
    --transition-base: 200ms cubic-bezier(0.4, 0, 0.2, 1);
    --transition-slow: 300ms cubic-bezier(0.4, 0, 0.2, 1);
    
    /* Raios de Borda */
    --radius-sm: 6px;
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
    color: var(--text-primary);
    line-height: 1.6;
    font-size: 14px;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

.container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
}

/* ========== CABEÇALHO APRIMORADO ========== */
.main-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    padding: 28px 32px;
    background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-lg);
    border: 2px solid var(--border-light);
    flex-wrap: wrap;
    gap: 20px;
    position: relative;
    overflow: hidden;
}

.main-header::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 5px;
    background: linear-gradient(90deg, #059669 0%, #047857 100%);
}

.header-title {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #059669 0%, #047857 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.header-buttons {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
}

/* ========== CARDS APRIMORADOS ========== */
.card {
    background: var(--bg-primary);
    border-radius: var(--radius-lg);
    margin-bottom: 28px;
    box-shadow: var(--shadow-md);
    border: 2px solid var(--border-light);
    overflow: hidden;
    transition: all var(--transition-base);
}

.card:hover {
    box-shadow: var(--shadow-lg);
    transform: translateY(-3px);
    border-color: var(--border-medium);
}

.card-header {
    padding: 18px 24px;
    background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
    border-bottom: 3px solid var(--accent-primary);
    font-weight: 800;
    font-size: 18px;
    color: var(--text-primary);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    letter-spacing: 0.3px;
}

.card-header::before {
    content: '';
    width: 5px;
    height: 100%;
    position: absolute;
    left: 0;
    top: 0;
    background: linear-gradient(180deg, #059669 0%, #047857 100%);
    box-shadow: var(--shadow-sm);
}

.card-body {
    padding: 28px;
}

/* ========== TABELAS APRIMORADAS ========== */
.table-minimal {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    font-size: 14px;
    margin-bottom: 16px;
    border-radius: var(--radius-md);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    border: 2px solid var(--border-light);
}

.table-minimal th {
    background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
    padding: 14px 12px;
    text-align: center;
    font-weight: 800;
    font-size: 13px;
    color: var(--text-primary);
    border-bottom: 3px solid var(--accent-primary);
    text-transform: uppercase;
    letter-spacing: 0.8px;
}

.table-minimal td {
    padding: 14px 12px;
    text-align: center;
    border-bottom: 1px solid var(--border-light);
    transition: all var(--transition-fast);
    background: var(--bg-primary);
    font-weight: 500;
}

.table-minimal tbody tr {
    transition: all var(--transition-fast);
    border-left: 3px solid transparent;
}

.table-minimal tbody tr:hover {
    background: var(--bg-secondary);
    transform: scale(1.008);
    box-shadow: var(--shadow-sm);
    border-left-color: var(--accent-primary);
}

.linha-invalida {
    background: var(--cor-erro) !important;
    animation: pulseErro 0.6s ease-in-out;
    border-left-color: var(--cor-erro-borda) !important;
}

.linha-invalida:hover {
    background: var(--cor-erro-hover) !important;
    border-left-color: var(--cor-erro-borda) !important;
}

/* ========== INPUTS APRIMORADOS ========== */
.table-input {
    width: 100%;
    border: 2px solid transparent;
    background: transparent;
    text-align: center;
    font-family: inherit;
    font-size: 15px;
    padding: 10px;
    outline: none;
    color: var(--text-primary);
    transition: all var(--transition-base);
    font-weight: 600;
    border-radius: var(--radius-sm);
}

.table-input:hover {
    background: var(--bg-secondary);
    border-color: var(--border-light);
}

.table-input:focus {
    background: var(--accent-subtle);
    border-color: var(--accent-primary);
    box-shadow: 0 0 0 4px rgba(5, 150, 105, 0.15);
    transform: scale(1.05);
}

.table-input.erro {
    background: var(--cor-erro);
    border-color: var(--cor-erro-borda);
    animation: shake 0.3s ease-in-out;
}

.table-input.valido {
    background: var(--cor-valido);
    border-color: var(--cor-valido-borda);
}

/* ========== BOTÕES APRIMORADOS ========== */
.btn-minimal {
    background: var(--bg-primary);
    border: 2px solid var(--border-light);
    color: var(--text-primary);
    padding: 10px 20px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all var(--transition-base);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border-radius: var(--radius-md);
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow-xs);
}

.btn-minimal:hover {
    border-color: var(--accent-primary);
    color: var(--accent-primary);
    transform: translateY(-3px);
    box-shadow: var(--shadow-md);
    background: var(--accent-subtle);
}

.btn-minimal:active {
    transform: translateY(-1px);
}

.btn-minimal:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
}

.btn-minimal:disabled:hover {
    background: var(--bg-primary);
    border-color: var(--border-light);
    color: var(--text-primary);
    box-shadow: none;
    transform: none;
}

.btn-minimal i {
    font-size: 17px;
}

.btn-small {
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
}

.btn-remove {
    color: var(--text-muted);
    border-color: var(--border-light);
}

.btn-remove:hover {
    background: #ef4444;
    color: white;
    border-color: #ef4444;
    box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
}

/* ========== INFO TEXT APRIMORADO ========== */
.info-text {
    font-size: 14px;
    color: var(--text-secondary);
    text-align: center;
    margin-top: 20px;
    padding: 16px 24px;
    background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
    border: 2px solid var(--border-light);
    border-radius: var(--radius-md);
    font-weight: 600;
    line-height: 1.6;
    box-shadow: var(--shadow-xs);
}

.info-text::before {
    content: '💡 ';
    margin-right: 8px;
    font-size: 16px;
}

/* ========== NOTIFICAÇÕES APRIMORADAS ========== */
.notification {
    position: fixed;
    top: 28px;
    right: 28px;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    color: white;
    padding: 18px 28px;
    font-size: 15px;
    font-weight: 700;
    z-index: 1000;
    transform: translateX(400px);
    transition: transform var(--transition-slow);
    box-shadow: var(--shadow-xl);
    border-radius: var(--radius-lg);
    border: 2px solid rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(12px);
}

.notification.show {
    transform: translateX(0);
    animation: slideIn 0.3s ease-out;
}

.notification.error {
    background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
    border-color: rgba(255, 255, 255, 0.2);
}

.notification.warning {
    background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
    border-color: rgba(255, 255, 255, 0.2);
}

/* ========== ANIMAÇÕES ========== */
@keyframes fadeIn {
    from { 
        opacity: 0; 
        transform: translateY(15px);
    }
    to { 
        opacity: 1; 
        transform: translateY(0);
    }
}

@keyframes slideIn {
    from { 
        transform: translateX(400px);
        opacity: 0;
    }
    to { 
        transform: translateX(0);
        opacity: 1;
    }
}

@keyframes pulseErro {
    0%, 100% { 
        background-color: var(--cor-erro); 
        transform: scale(1);
    }
    50% { 
        background-color: var(--cor-erro-hover); 
        transform: scale(1.015);
    }
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
}

/* ========== IMPRESSÃO ========== */
@media print {
    body { 
        background: white; 
    }
    .notification, .btn-minimal, .header-buttons { 
        display: none; 
    }
    .card { 
        box-shadow: none; 
        border: 2px solid #000; 
        page-break-inside: avoid;
    }
    .table-minimal {
        border: 2px solid #000;
    }
    .table-minimal th,
    .table-minimal td {
        border: 1px solid #000;
    }
    .linha-invalida {
        background: white !important;
    }
}

/* ========== RESPONSIVIDADE ========== */
@media (max-width: 768px) {
    .container { 
        padding: 16px; 
    }
    .main-header { 
        padding: 24px; 
        flex-direction: column; 
        align-items: stretch;
    }
    .header-title { 
        font-size: 26px; 
        text-align: center;
    }
    .header-buttons { 
        width: 100%; 
        justify-content: center; 
    }
    .card-body {
        padding: 20px;
    }
    .table-minimal {
        font-size: 13px;
    }
    .table-minimal th,
    .table-minimal td {
        padding: 10px 8px;
    }
}

/* ========== SCROLLBAR PERSONALIZADA ========== */
::-webkit-scrollbar {
    width: 12px;
    height: 12px;
}

::-webkit-scrollbar-track {
    background: var(--bg-secondary);
    border-radius: var(--radius-sm);
}

::-webkit-scrollbar-thumb {
    background: var(--border-medium);
    border-radius: var(--radius-sm);
    border: 2px solid var(--bg-secondary);
}

::-webkit-scrollbar-thumb:hover {
    background: var(--accent-primary);
}

/* ========== ESTADOS DE FOCO (ACESSIBILIDADE) ========== */
*:focus-visible {
    outline: 3px solid var(--accent-primary);
    outline-offset: 2px;
}

.btn-minimal:focus-visible {
    outline: 3px solid var(--accent-primary);
    outline-offset: 3px;
}

/* ========== REMOVER SPINNERS DOS INPUTS NUMBER ========== */
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
}

input[type="number"] {
    -moz-appearance: textfield;
}
    </style>
</head>
<body>
    <div class="container">
        <!-- CABEÇALHO COM TÍTULO E BOTÕES -->
        <div class="main-header">
            <div class="header-title">Gerenciar Caminhões - Frota e Motoristas</div>
            <div class="header-buttons">
                <button class="btn-minimal" id="btn-adicionar-caminhao">
                    <i class="fas fa-plus"></i> Adicionar Caminhão
                </button>
                <button class="btn-minimal" id="btn-salvar-caminhoes">
                    <i class="fas fa-save"></i> Salvar Caminhões
                </button>
            </div>
        </div>

        <div class="card">
            <div class="card-header">Caminhões e Motoristas</div>
            <div class="card-body">
                <table class="table-minimal" id="tabela-caminhoes">
                    <thead>
                        <tr>
                            <th>Placa</th>
                            <th>Motorista</th>
                            <th>Capacidade (Lado+Bico)</th>
                            <th>Capacidade (Todos de Lado)</th>
                            <th>Ordem</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-caminhoes"></tbody>
                </table>
                <div class="info-text">
                    Formato de placa: Mercosul (ABC1D23) ou Antigo (ABC1234) - Mínimo 4 caracteres
                </div>
            </div>
        </div>
    </div>

    <div class="notification" id="notification">
        <span id="notification-text">Caminhões carregados</span>
    </div>

    <script>
        let caminhoes = [
            { placa: "6E31", motorista: "AGIMIRO", capacidadeLadoBico: 14, capacidadeTodosLado: 16 },
            { placa: "5H84", motorista: "PEREIRA", capacidadeLadoBico: 10, capacidadeTodosLado: 11 },
            { placa: "1D72", motorista: "LUIZ", capacidadeLadoBico: 12, capacidadeTodosLado: 14 },
            { placa: "9409", motorista: "ALLAN", capacidadeLadoBico: 8, capacidadeTodosLado: 10 },
            { placa: "2G76", motorista: "MARCELO V", capacidadeLadoBico: 15, capacidadeTodosLado: 17 },
            { placa: "1G23", motorista: "VANESSA", capacidadeLadoBico: 11, capacidadeTodosLado: 13 },
            { placa: "8L43", motorista: "GUSTAVO", capacidadeLadoBico: 9, capacidadeTodosLado: 11 },
            { placa: "4H33", motorista: "EVERSON", capacidadeLadoBico: 13, capacidadeTodosLado: 15 },
            { placa: "8H89", motorista: "J FRANCISCO", capacidadeLadoBico: 10, capacidadeTodosLado: 12 },
            { placa: "7F99", motorista: "SUELLEN", capacidadeLadoBico: 8, capacidadeTodosLado: 9 },
            { placa: "4B42", motorista: "J ALMIR", capacidadeLadoBico: 14, capacidadeTodosLado: 16 },
            { placa: "8996", motorista: "MONICA", capacidadeLadoBico: 12, capacidadeTodosLado: 14 },
            { placa: "7G54", motorista: "J BOSCO", capacidadeLadoBico: 11, capacidadeTodosLado: 13 }
        ];

        // ========== FUNÇÃO PARA COMUNICAÇÃO COM PÁGINA PAI ==========
        function notificarSalvamento() {
            if (window.parent !== window) {
                window.parent.postMessage('dadosSalvos', '*');
            }
        }

        // Função melhorada para validar placa
        function validarPlaca(placa) {
            if (!placa || placa.length < 4) return false;
            
            // Remove espaços e converte para maiúsculas
            placa = placa.trim().toUpperCase().replace(/\s/g, '');
            
            // Verifica formato Mercosul (ABC1D23) ou Antigo (ABC1234)
            const formatoMercosul = /^[A-Z]{3}[0-9][A-Z][0-9]{2}$/;
            const formatoAntigo = /^[A-Z]{3}[0-9]{4}$/;
            const formatoSimplificado = /^[A-Z0-9]{4,7}$/;
            
            return formatoMercosul.test(placa) || formatoAntigo.test(placa) || formatoSimplificado.test(placa);
        }

        // Função para validar capacidade
        function validarCapacidade(ladoBico, todosLado) {
            return ladoBico > 0 && todosLado > 0 && todosLado >= ladoBico;
        }

        // Função para verificar placa duplicada
        function placaDuplicada(placa, indexAtual) {
            return caminhoes.some((cam, index) => 
                index !== indexAtual && cam.placa.toUpperCase() === placa.toUpperCase()
            );
        }

        // Função para atualizar visualização de erros
        function atualizarVisualizacaoErros() {
            const linhas = document.querySelectorAll('#corpo-caminhoes tr');
            linhas.forEach((linha, index) => {
                const placaInput = linha.querySelector('.placa');
                const motoristaInput = linha.querySelector('.motorista');
                const capacidadeLadoBicoInput = linha.querySelector('.capacidade-lado-bico');
                const capacidadeTodosLadoInput = linha.querySelector('.capacidade-todos-lado');
                
                const placa = placaInput ? placaInput.value.trim() : '';
                const motorista = motoristaInput ? motoristaInput.value.trim() : '';
                const capacidadeLadoBico = capacidadeLadoBicoInput ? parseInt(capacidadeLadoBicoInput.value) : 0;
                const capacidadeTodosLado = capacidadeTodosLadoInput ? parseInt(capacidadeTodosLadoInput.value) : 0;
                
                const placaValida = validarPlaca(placa) && !placaDuplicada(placa, index);
                const motoristaValido = motorista.length >= 2;
                const capacidadeValida = validarCapacidade(capacidadeLadoBico, capacidadeTodosLado);
                
                const linhaValida = placaValida && motoristaValido && capacidadeValida;
                
                // Atualiza classes CSS
                linha.classList.toggle('linha-invalida', !linhaValida);
                
                if (placaInput) {
                    placaInput.classList.toggle('erro', !placaValida && placa.length > 0);
                    placaInput.classList.toggle('valido', placaValida);
                }
                
                if (motoristaInput) {
                    motoristaInput.classList.toggle('erro', !motoristaValido && motorista.length > 0);
                    motoristaInput.classList.toggle('valido', motoristaValido);
                }
                
                if (capacidadeLadoBicoInput) {
                    capacidadeLadoBicoInput.classList.toggle('erro', !capacidadeValida && capacidadeLadoBico > 0);
                    capacidadeLadoBicoInput.classList.toggle('valido', capacidadeValida);
                }
                
                if (capacidadeTodosLadoInput) {
                    capacidadeTodosLadoInput.classList.toggle('erro', !capacidadeValida && capacidadeTodosLado > 0);
                    capacidadeTodosLadoInput.classList.toggle('valido', capacidadeValida);
                }
            });
        }

        function salvarCaminhoes() {
            // Verifica se há erros antes de salvar
            const linhasInvalidas = document.querySelectorAll('.linha-invalida');
            if (linhasInvalidas.length > 0) {
                showNotification('Corrija os campos em vermelho antes de salvar', 'error');
                return;
            }
            
            localStorage.setItem('caminhoes', JSON.stringify(caminhoes));
            showNotification('Caminhões salvos com sucesso');
            
            // ✅ CORREÇÃO: Notificar a página pai
            notificarSalvamento();
        }

        function carregarCaminhoes() {
            const tbody = document.getElementById('corpo-caminhoes');
            tbody.innerHTML = '';
            caminhoes.forEach((cam, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><input type="text" class="table-input placa" value="${cam.placa}" style="text-transform: uppercase;" placeholder="ABC1234"></td>
                    <td><input type="text" class="table-input motorista" value="${cam.motorista}" style="text-transform: uppercase;" placeholder="Nome motorista"></td>
                    <td><input type="number" class="table-input capacidade-lado-bico" value="${cam.capacidadeLadoBico}" min="1" placeholder="14"></td>
                    <td><input type="number" class="table-input capacidade-todos-lado" value="${cam.capacidadeTodosLado}" min="1" placeholder="16"></td>
                    <td>
                        <button class="btn-minimal btn-small" onclick="moverCaminhao(${index}, -1)" ${index === 0 ? 'disabled' : ''}>↑</button>
                        <button class="btn-minimal btn-small" onclick="moverCaminhao(${index}, 1)" ${index === caminhoes.length - 1 ? 'disabled' : ''}>↓</button>
                    </td>
                    <td><button class="btn-minimal btn-small btn-remove" onclick="removerCaminhao(${index})">Remover</button></td>
                `;
                tbody.appendChild(tr);

                const inputs = tr.querySelectorAll('input');
                inputs.forEach(input => {
                    input.addEventListener('input', () => {
                        const placa = tr.querySelector('.placa').value.trim().toUpperCase();
                        const motorista = tr.querySelector('.motorista').value.trim().toUpperCase();
                        const capacidadeLadoBico = parseInt(tr.querySelector('.capacidade-lado-bico').value) || 0;
                        const capacidadeTodosLado = parseInt(tr.querySelector('.capacidade-todos-lado').value) || 0;

                        if (validarPlaca(placa) && motorista && validarCapacidade(capacidadeLadoBico, capacidadeTodosLado) && !placaDuplicada(placa, index)) {
                            caminhoes[index] = { placa, motorista, capacidadeLadoBico, capacidadeTodosLado };
                            salvarCaminhoes();
                        }
                        
                        // Atualiza visualização de erros em tempo real
                        atualizarVisualizacaoErros();
                    });
                });
            });
            
            // Atualiza visualização após carregar
            setTimeout(atualizarVisualizacaoErros, 100);
        }

        function adicionarCaminhao() {
            const tbody = document.getElementById('corpo-caminhoes');
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="text" class="table-input placa" placeholder="ABC1234" style="text-transform: uppercase;"></td>
                <td><input type="text" class="table-input motorista" placeholder="Nome motorista" style="text-transform: uppercase;"></td>
                <td><input type="number" class="table-input capacidade-lado-bico" placeholder="14" min="1"></td>
                <td><input type="number" class="table-input capacidade-todos-lado" placeholder="16" min="1"></td>
                <td></td>
                <td><button class="btn-minimal btn-small btn-remove" onclick="salvarNovoCaminhao(this)">Salvar</button></td>
            `;
            tbody.appendChild(tr);
            tr.querySelector('input.placa').focus();
            showNotification('Novo caminhão adicionado - Preencha os dados');
            
            // Atualiza visualização
            atualizarVisualizacaoErros();
        }

        function salvarNovoCaminhao(btn) {
            const tr = btn.parentElement.parentElement;
            const placa = tr.querySelector('.placa').value.trim().toUpperCase();
            const motorista = tr.querySelector('.motorista').value.trim().toUpperCase();
            const capacidadeLadoBico = parseInt(tr.querySelector('.capacidade-lado-bico').value) || 0;
            const capacidadeTodosLado = parseInt(tr.querySelector('.capacidade-todos-lado').value) || 0;

            if (!validarPlaca(placa)) {
                showNotification('Placa inválida. Use formato Mercosul ou Antigo', 'error');
                return;
            }

            if (placaDuplicada(placa, -1)) {
                showNotification('Placa já existe no sistema', 'error');
                return;
            }

            if (!motorista || motorista.length < 2) {
                showNotification('Nome do motorista deve ter pelo menos 2 caracteres', 'error');
                return;
            }

            if (!validarCapacidade(capacidadeLadoBico, capacidadeTodosLado)) {
                showNotification('Capacidade inválida. Todos de lado deve ser >= Lado+Bico', 'error');
                return;
            }

            caminhoes.push({ placa, motorista, capacidadeLadoBico, capacidadeTodosLado });
            carregarCaminhoes();
            salvarCaminhoes();
            showNotification(`Caminhão ${placa} adicionado com sucesso`);
        }

        function removerCaminhao(index) {
            const placa = caminhoes[index].placa;
            if (confirm(`Tem certeza que deseja remover o caminhão ${placa}?`)) {
                caminhoes.splice(index, 1);
                carregarCaminhoes();
                salvarCaminhoes();
                showNotification(`Caminhão ${placa} removido`);
            }
        }

        function moverCaminhao(index, direcao) {
            const novaPosicao = index + direcao;
            if (novaPosicao >= 0 && novaPosicao < caminhoes.length) {
                [caminhoes[index], caminhoes[novaPosicao]] = [caminhoes[novaPosicao], caminhoes[index]];
                carregarCaminhoes();
                salvarCaminhoes();
                showNotification('Ordem dos caminhões atualizada');
            }
        }

        // ========== EVENT LISTENERS ==========
        document.getElementById('btn-adicionar-caminhao').addEventListener('click', adicionarCaminhao);
        document.getElementById('btn-salvar-caminhoes').addEventListener('click', salvarCaminhoes);

        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            const notificationText = document.getElementById('notification-text');
            
            notificationText.textContent = message;
            notification.className = 'notification show';
            
            if (type === 'error') {
                notification.classList.add('error');
            } else if (type === 'warning') {
                notification.classList.add('warning');
            }
            
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => {
                    notification.classList.remove('error', 'warning');
                }, 300);
            }, 3000);
        }

        // ========== INICIALIZAÇÃO ==========
        document.addEventListener('DOMContentLoaded', () => {
            const savedCaminhoes = localStorage.getItem('caminhoes');
            if (savedCaminhoes) caminhoes = JSON.parse(savedCaminhoes);
            carregarCaminhoes();
            setTimeout(() => showNotification('Sistema de caminhões carregado'), 800);
        });
    </script>
</body>
</html>
