    /* ========== DESIGN PROFISSIONAL APRIMORADO - GERENCIAR ROTAS ========== */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

:root {
    /* Cores Principais - Paleta Aprimorada com Melhor Contraste */
    --bg-primary: #ffffff;
    --bg-secondary: #f8fafc;
    --bg-tertiary: #f1f5f9;
    --bg-hover: #e2e8f0;
    
    /* Textos - Hierarquia com Mais Contraste */
    --text-primary: #0f172a;
    --text-secondary: #334155;
    --text-muted: #64748b;
    --text-light: #94a3b8;
    
    /* Bordas - Mais Definidas */
    --border-light: #cbd5e1;
    --border-medium: #94a3b8;
    --border-dark: #64748b;
    --border-strong: #475569;
    
    /* Accent - Verde Mais Vibrante */
    --accent-primary: #059669;
    --accent-primary-hover: #047857;
    --accent-primary-light: #d1fae5;
    --accent-subtle: #ecfdf5;
    
    /* Sombras - Mais Pronunciadas */
    --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.08);
    --shadow-sm: 0 2px 4px 0 rgba(0, 0, 0, 0.12);
    --shadow-md: 0 4px 8px -1px rgba(0, 0, 0, 0.15);
    --shadow-lg: 0 10px 20px -3px rgba(0, 0, 0, 0.18);
    --shadow-xl: 0 20px 30px -5px rgba(0, 0, 0, 0.22);
    
    /* Cores das Rotas - Mais Vibrantes e Distintas */
    --cor-rota-1: #dbeafe;
    --cor-rota-1-hover: #bfdbfe;
    --cor-rota-2: #d1fae5;
    --cor-rota-2-hover: #a7f3d0;
    --cor-rota-3: #fed7aa;
    --cor-rota-3-hover: #fdba74;
    --cor-rota-4: #e9d5ff;
    --cor-rota-4-hover: #d8b4fe;
    --cor-rota-5: #fef3c7;
    --cor-rota-5-hover: #fde68a;
    --cor-rota-6: #ddd6fe;
    --cor-rota-6-hover: #c4b5fd;
    --cor-rota-7: #fecaca;
    --cor-rota-7-hover: #fca5a5;
    --cor-rota-8: #a7f3d0;
    --cor-rota-8-hover: #6ee7b7;
    --cor-rota-9: #bae6fd;
    --cor-rota-9-hover: #7dd3fc;
    
    /* Transições */
    --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
    --transition-base: 200ms cubic-bezier(0.4, 0, 0.2, 1);
    --transition-slow: 300ms cubic-bezier(0.4, 0, 0.2, 1);
    
    /* Raios de Borda */
    --radius-sm: 6px;
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
    color: var(--text-primary);
    line-height: 1.6;
    font-size: 14px;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

.container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
}

/* ========== CABEÇALHO APRIMORADO ========== */
.main-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    padding: 28px 32px;
    background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-lg);
    border: 2px solid var(--border-light);
    flex-wrap: wrap;
    gap: 20px;
    position: relative;
    overflow: hidden;
}

.main-header::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 5px;
    background: linear-gradient(90deg, #059669 0%, #047857 100%);
}

.header-title {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #059669 0%, #047857 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.header-buttons {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
}

/* ========== CARDS APRIMORADOS ========== */
.card {
    background: var(--bg-primary);
    border-radius: var(--radius-lg);
    margin-bottom: 28px;
    box-shadow: var(--shadow-md);
    border: 2px solid var(--border-light);
    overflow: hidden;
    transition: all var(--transition-base);
}

.card:hover {
    box-shadow: var(--shadow-lg);
    transform: translateY(-3px);
    border-color: var(--border-medium);
}

.card-header {
    padding: 18px 24px;
    background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
    border-bottom: 3px solid var(--accent-primary);
    font-weight: 800;
    font-size: 18px;
    color: var(--text-primary);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    letter-spacing: 0.3px;
}

.card-header::before {
    content: '';
    width: 5px;
    height: 100%;
    position: absolute;
    left: 0;
    top: 0;
    background: linear-gradient(180deg, #059669 0%, #047857 100%);
    box-shadow: var(--shadow-sm);
}

.card-body {
    padding: 28px;
}

/* ========== TABELAS APRIMORADAS ========== */
.table-minimal {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    font-size: 14px;
    margin-bottom: 16px;
    border-radius: var(--radius-md);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    border: 2px solid var(--border-light);
}

.table-minimal th {
    background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
    padding: 14px 12px;
    text-align: center;
    font-weight: 800;
    font-size: 13px;
    color: var(--text-primary);
    border-bottom: 3px solid var(--accent-primary);
    text-transform: uppercase;
    letter-spacing: 0.8px;
}

.table-minimal td {
    padding: 14px 12px;
    text-align: center;
    border-bottom: 1px solid var(--border-light);
    transition: all var(--transition-fast);
    background: var(--bg-primary);
    font-weight: 500;
}

.table-minimal tbody tr {
    transition: all var(--transition-fast);
    border-left: 3px solid transparent;
}

.table-minimal tbody tr:hover {
    background: var(--bg-secondary);
    transform: scale(1.008);
    box-shadow: var(--shadow-sm);
    border-left-color: var(--accent-primary);
}

.table-rota-1 tr:hover { background: var(--cor-rota-1-hover) !important; border-left-color: #3b82f6 !important; }
.table-rota-2 tr:hover { background: var(--cor-rota-2-hover) !important; border-left-color: #10b981 !important; }
.table-rota-3 tr:hover { background: var(--cor-rota-3-hover) !important; border-left-color: #f97316 !important; }
.table-rota-4 tr:hover { background: var(--cor-rota-4-hover) !important; border-left-color: #a855f7 !important; }
.table-rota-5 tr:hover { background: var(--cor-rota-5-hover) !important; border-left-color: #eab308 !important; }
.table-rota-6 tr:hover { background: var(--cor-rota-6-hover) !important; border-left-color: #8b5cf6 !important; }
.table-rota-7 tr:hover { background: var(--cor-rota-7-hover) !important; border-left-color: #ef4444 !important; }
.table-rota-8 tr:hover { background: var(--cor-rota-8-hover) !important; border-left-color: #14b8a6 !important; }
.table-rota-9 tr:hover { background: var(--cor-rota-9-hover) !important; border-left-color: #06b6d4 !important; }

/* ========== INPUTS APRIMORADOS ========== */
.table-input {
    width: 100%;
    border: 2px solid transparent;
    background: transparent;
    text-align: center;
    font-family: inherit;
    font-size: 15px;
    padding: 10px;
    outline: none;
    color: var(--text-primary);
    transition: all var(--transition-base);
    font-weight: 600;
    border-radius: var(--radius-sm);
}

.table-input:hover {
    background: var(--bg-secondary);
    border-color: var(--border-light);
}

.table-input:focus {
    background: var(--accent-subtle);
    border-color: var(--accent-primary);
    box-shadow: 0 0 0 4px rgba(5, 150, 105, 0.15);
    transform: scale(1.05);
}

.endereco-texto {
    display: inline-block;
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
    text-align: left;
    font-weight: 600;
}

.endereco-input {
    width: 100%;
    min-width: 300px;
    text-align: left;
}

/* ========== BOTÕES APRIMORADOS ========== */
.btn-minimal {
    background: var(--bg-primary);
    border: 2px solid var(--border-light);
    color: var(--text-primary);
    padding: 10px 20px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all var(--transition-base);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border-radius: var(--radius-md);
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow-xs);
}

.btn-minimal:hover {
    border-color: var(--accent-primary);
    color: var(--accent-primary);
    transform: translateY(-3px);
    box-shadow: var(--shadow-md);
    background: var(--accent-subtle);
}

.btn-minimal:active {
    transform: translateY(-1px);
}

.btn-minimal:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
}

.btn-minimal:disabled:hover {
    background: var(--bg-primary);
    border-color: var(--border-light);
    color: var(--text-primary);
    box-shadow: none;
    transform: none;
}

.btn-minimal i {
    font-size: 17px;
}

.btn-small {
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
}

.btn-remove {
    color: var(--text-muted);
    border-color: var(--border-light);
}

.btn-remove:hover {
    background: #ef4444;
    color: white;
    border-color: #ef4444;
    box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
}

/* ========== NOTIFICAÇÕES APRIMORADAS ========== */
.notification {
    position: fixed;
    top: 28px;
    right: 28px;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    color: white;
    padding: 18px 28px;
    font-size: 15px;
    font-weight: 700;
    z-index: 1000;
    transform: translateX(400px);
    transition: transform var(--transition-slow);
    box-shadow: var(--shadow-xl);
    border-radius: var(--radius-lg);
    border: 2px solid rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(12px);
}

.notification.show {
    transform: translateX(0);
    animation: slideIn 0.3s ease-out;
}

/* ========== ANIMAÇÕES ========== */
@keyframes fadeIn {
    from { 
        opacity: 0; 
        transform: translateY(15px);
    }
    to { 
        opacity: 1; 
        transform: translateY(0);
    }
}

@keyframes slideIn {
    from { 
        transform: translateX(400px);
        opacity: 0;
    }
    to { 
        transform: translateX(0);
        opacity: 1;
    }
}

/* ========== IMPRESSÃO ========== */
@media print {
    body { 
        background: white; 
    }
    .notification, .btn-minimal, .header-buttons { 
        display: none; 
    }
    .card { 
        box-shadow: none; 
        border: 2px solid #000; 
        page-break-inside: avoid;
    }
    .table-minimal {
        border: 2px solid #000;
    }
    .table-minimal th,
    .table-minimal td {
        border: 1px solid #000;
    }
}

/* ========== RESPONSIVIDADE ========== */
@media (max-width: 768px) {
    .container { 
        padding: 16px; 
    }
    .main-header { 
        padding: 24px; 
        flex-direction: column; 
        align-items: stretch;
    }
    .header-title { 
        font-size: 26px; 
        text-align: center;
    }
    .header-buttons { 
        width: 100%; 
        justify-content: center; 
    }
    .card-body {
        padding: 20px;
    }
    .table-minimal {
        font-size: 13px;
    }
    .endereco-input {
        min-width: 200px;
    }
}

/* ========== SCROLLBAR PERSONALIZADA ========== */
::-webkit-scrollbar {
    width: 12px;
    height: 12px;
}

::-webkit-scrollbar-track {
    background: var(--bg-secondary);
    border-radius: var(--radius-sm);
}

::-webkit-scrollbar-thumb {
    background: var(--border-medium);
    border-radius: var(--radius-sm);
    border: 2px solid var(--bg-secondary);
}

::-webkit-scrollbar-thumb:hover {
    background: var(--accent-primary);
}

/* ========== ESTADOS DE FOCO (ACESSIBILIDADE) ========== */
*:focus-visible {
    outline: 3px solid var(--accent-primary);
    outline-offset: 2px;
}

.btn-minimal:focus-visible {
    outline: 3px solid var(--accent-primary);
    outline-offset: 3px;
}
    </style>

            ],
            "PRAIA GRANDE": [
                { loja: 58, endereco: "Av. do Trabalhador - 4000 - Vila Antártica - Praia Grande - SP - CEP: 11720-090" }
            ]
        };

        const coresRotas = [
            { bg: 'var(--cor-rota-1)', hoverClass: 'table-rota-1' },
            { bg: 'var(--cor-rota-2)', hoverClass: 'table-rota-2' },
            { bg: 'var(--cor-rota-3)', hoverClass: 'table-rota-3' },
            { bg: 'var(--cor-rota-4)', hoverClass: 'table-rota-4' },
            { bg: 'var(--cor-rota-5)', hoverClass: 'table-rota-5' },
            { bg: 'var(--cor-rota-6)', hoverClass: 'table-rota-6' },
            { bg: 'var(--cor-rota-7)', hoverClass: 'table-rota-7' },
            { bg: 'var(--cor-rota-8)', hoverClass: 'table-rota-8' },
            { bg: 'var(--cor-rota-9)', hoverClass: 'table-rota-9' }
        ];

        // ========== FUNÇÃO PARA COMUNICAÇÃO COM PÁGINA PAI ==========
        function notificarSalvamento() {
            if (window.parent !== window) {
                window.parent.postMessage('dadosSalvos', '*');
            }
        }

        function salvarRotas() {
            localStorage.setItem('rotas', JSON.stringify(rotas));
            // ✅ CORREÇÃO: Notificar a página pai
            notificarSalvamento();
        }

        function carregarRotas() {
            const container = document.getElementById('rotas-container');
            container.innerHTML = '';
            const rotasKeys = Object.keys(rotas);
            rotasKeys.forEach((nomeRota, index) => {
                const cor = coresRotas[index % coresRotas.length];
                const divRota = document.createElement('div');
                divRota.className = 'card';
                divRota.innerHTML = `
                    <div class="card-header" style="background: ${cor.bg}">
                        ${nomeRota}
                        <div>
                            <button class="btn-minimal btn-small" onclick="moverRota('${nomeRota}', -1)" ${index === 0 ? 'disabled' : ''}>↑</button>
                            <button class="btn-minimal btn-small" onclick="moverRota('${nomeRota}', 1)" ${index === rotasKeys.length - 1 ? 'disabled' : ''}>↓</button>
                        </div>
                    </div>
                    <div class="card-body">
                        <table class="table-minimal ${cor.hoverClass}">
                            <thead style="background: ${cor.bg}">
                                <tr><th>Loja</th><th>Endereço</th><th>Ordem</th><th>Ação</th></tr>
                            </thead>
                            <tbody id="tbody-${nomeRota}"></tbody>
                        </table>
                        <button class="btn-minimal btn-small" onclick="adicionarLoja('${nomeRota}')">Adicionar Loja</button>
                    </div>`;
                container.appendChild(divRota);

                const tbody = document.getElementById(`tbody-${nomeRota}`);
                rotas[nomeRota].forEach((loja, lojaIndex) => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${loja.loja}</td>
                        <td>
                            <span class="endereco-texto">${loja.endereco}</span>
                            <input type="text" class="table-input endereco-input" style="display:none;" value="${loja.endereco}">
                        </td>
                        <td>
                            <button class="btn-minimal btn-small" onclick="moverLoja('${nomeRota}', ${lojaIndex}, -1)" ${lojaIndex === 0 ? 'disabled' : ''}>↑</button>
                            <button class="btn-minimal btn-small" onclick="moverLoja('${nomeRota}', ${lojaIndex}, 1)" ${lojaIndex === rotas[nomeRota].length - 1 ? 'disabled' : ''}>↓</button>
                        </td>
                        <td>
                            <button class="btn-minimal btn-small" onclick="editarEndereco(this)">Editar</button>
                            <button class="btn-minimal btn-small btn-remove" onclick="removerLoja('${nomeRota}', ${lojaIndex})">Remover</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            });
        }

        function adicionarLoja(nomeRota) {
            const tbody = document.getElementById(`tbody-${nomeRota}`);
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="number" class="table-input loja" min="1" placeholder="Nº"></td>
                <td><input type="text" class="table-input endereco" placeholder="Endereço"></td>
                <td></td>
                <td><button class="btn-minimal btn-small btn-remove" onclick="salvarNovaLoja('${nomeRota}', this)">Salvar</button></td>
            `;
            tbody.appendChild(tr);
            tr.querySelector('input.loja').focus();
            salvarRotas();
            showNotification('Nova linha de loja adicionada');
        }

        function salvarNovaLoja(nomeRota, btn) {
            const tr = btn.parentElement.parentElement;
            const loja = parseInt(tr.querySelector('.loja').value) || 0;
            const endereco = tr.querySelector('.endereco').value.trim();

            if (loja > 0 && endereco) {
                rotas[nomeRota].push({ loja, endereco });
                tr.remove();
                carregarRotas();
                salvarRotas();
                showNotification('Loja adicionada e salva');
            } else {
                showNotification('Preencha todos os campos');
            }
        }

        function removerLoja(nomeRota, index) {
            rotas[nomeRota].splice(index, 1);
            carregarRotas();
            salvarRotas();
            showNotification('Loja removida e salva');
        }

        function moverLoja(nomeRota, index, direcao) {
            const lojas = rotas[nomeRota];
            const novaPosicao = index + direcao;
            if (novaPosicao >= 0 && novaPosicao < lojas.length) {
                [lojas[index], lojas[novaPosicao]] = [lojas[novaPosicao], lojas[index]];
                carregarRotas();
                salvarRotas();
                showNotification('Loja movida e salva');
            }
        }

        function moverRota(nomeRota, direcao) {
            const rotasKeys = Object.keys(rotas);
            const index = rotasKeys.indexOf(nomeRota);
            const novaPosicao = index + direcao;
            if (novaPosicao >= 0 && novaPosicao < rotasKeys.length) {
                const novaOrdem = [...rotasKeys];
                [novaOrdem[index], novaOrdem[novaPosicao]] = [novaOrdem[novaPosicao], novaOrdem[index]];
                const novasRotas = {};
                novaOrdem.forEach(key => novasRotas[key] = rotas[key]);
                rotas = novasRotas;
                carregarRotas();
                salvarRotas();
                showNotification('Rota movida e salva');
            }
        }

        function editarEndereco(btn) {
            const td = btn.parentElement.parentElement.querySelector('td:nth-child(2)');
            const texto = td.querySelector('.endereco-texto');
            const input = td.querySelector('.endereco-input');
            if (btn.textContent === 'Editar') {
                texto.style.display = 'none';
                input.style.display = 'block';
                input.focus();
                btn.textContent = 'Salvar';
            } else {
                const novoEndereco = input.value.trim();
                if (novoEndereco) {
                    const nomeRota = btn.closest('.card').querySelector('.card-header').firstChild.textContent.trim();
                    const index = Array.from(btn.closest('tbody').children).indexOf(btn.closest('tr'));
                    rotas[nomeRota][index].endereco = novoEndereco;
                    texto.textContent = novoEndereco;
                    texto.style.display = 'block';
                    input.style.display = 'none';
                    btn.textContent = 'Editar';
                    salvarRotas();
                    showNotification('Endereço atualizado e salva');
                } else {
                    showNotification('Endereço inválido');
                }
            }
        }

        // ========== EVENT LISTENERS ==========
        document.getElementById('btn-adicionar-rota').addEventListener('click', () => {
            const nome = prompt('Nome da nova rota:');
            if (nome && !rotas[nome]) {
                rotas[nome] = [];
                carregarRotas();
                salvarRotas();
                showNotification('Rota adicionada e salva');
            } else {
                showNotification('Nome inválido ou já existente');
            }
        });

        document.getElementById('btn-salvar-rotas').addEventListener('click', () => {
            salvarRotas();
            showNotification('Rotas salvas manualmente');
        });

        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.querySelector('#notification-text').textContent = message;
            notification.className = 'notification show';
            setTimeout(() => notification.classList.remove('show'), 3000);
        }

        // ========== INICIALIZAÇÃO ==========
        document.addEventListener('DOMContentLoaded', () => {
            const savedRotas = localStorage.getItem('rotas');
            if (savedRotas) rotas = JSON.parse(savedRotas);
            carregarRotas();
        });
    </script>
</body>
</html>
