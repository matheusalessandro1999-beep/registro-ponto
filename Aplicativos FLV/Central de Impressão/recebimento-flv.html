<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Recebimento FLV - Nagumo</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Arial:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: white;
        }

        /* Estilos para a página A4 */
        .pagina-a4 {
            width: 210mm;
            height: 297mm;
            padding: 30mm 8mm 8mm 8mm;
            margin: 0 auto;
            background: white;
            position: relative;
        }

        /* Cabeçalho com logos */
        .cabecalho {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6mm;
            padding-bottom: 2mm;
        }

        .logo-nagumo {
            width: 35mm;
            height: auto;
        }

        .titulo-documento {
            flex: 1;
            text-align: center;
            padding: 0 10mm;
        }

        .titulo-documento h1 {
            font-size: 14pt;
            font-weight: 900;
            color: #000;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin: 0;
            white-space: nowrap;
        }

        /* TABELA DO CANHOTO - LARGURAS IGUAIS */
        .tabela-canhoto {
            width: 100%;
            border-collapse: collapse;
            border: 1.5px solid #000;
            margin-bottom: 4mm;
            table-layout: fixed;
        }

        .tabela-canhoto th,
        .tabela-canhoto td {
            width: 16.66%;
            border: 1px solid #000;
            padding: 2mm 1mm;
            text-align: center;
            font-size: 8pt;
        }

        .tabela-canhoto th {
            background: #e8e8e8;
            font-weight: 900;
            text-transform: uppercase;
            color: #000;
        }

        .tabela-canhoto td {
            height: 8mm;
            font-size: 9pt;
        }

        /* Tabela de Produtos - COLUNA QTDE BEM ESTREITA */
        .tabela-produtos {
            width: 100%;
            border-collapse: collapse;
            border: 1.5px solid #000;
            margin-bottom: 4mm;
        }

        .tabela-produtos th {
            background: #e8e8e8;
            border: 1px solid #000;
            padding: 2.5mm 3mm;
            text-align: center;
            font-weight: 900;
            font-size: 10pt;
            text-transform: uppercase;
            color: #000;
        }

        .tabela-produtos td {
            border: 1px solid #000;
            padding: 2mm 3mm;
            height: 7mm;
            font-size: 10pt;
        }

        .tabela-produtos td.produto-nome {
            text-align: left;
            width: auto; /* Ocupa todo espaço disponível */
        }

        .tabela-produtos td.produto-qtde {
            text-align: center;
            width: 32.5mm; /* METADE da largura anterior (50mm -> 25mm) */
            min-width: 32.5mm;
            max-width: 32.5mm;
        }

        .info-abaixo-tabela {
            display: grid;
            grid-template-columns: 30mm 50mm 40mm 64mm; /* Tamanhos em mm */
            gap: 3mm;
            margin-bottom: 4mm;
            font-size: 10pt;
        }

        .campo-abaixo {
            display: flex;
            align-items: center;
            gap: 2mm;
            flex: 1;
        }

        .campo-abaixo label {
            font-weight: 700;
            color: #000;
            white-space: nowrap;
            font-size: 9pt;
        }

        .campo-abaixo .linha {
            flex: 1;
            border-bottom: 1px solid #000;
            min-height: 18px;
        }

        /* Seção de Observações MODIFICADA */
        .secao-observacoes {
            position: absolute;
            bottom: 10mm;
            left: 8mm;
            right: 8mm;
        }

        .linha-observacoes {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2mm;
        }

        .secao-observacoes label {
            font-weight: 900;
            font-size: 10pt;
            text-transform: uppercase;
        }

        .conferente {
            display: flex;
            align-items: center;
            gap: 2mm;
        }

        .conferente label {
            font-weight: 900;
            font-size: 11pt;
            text-transform: none; /* Remove o uppercase */
            white-space: nowrap;
        }

        .conferente .linha {
            width: 60mm;
            border-bottom: 1px solid #000;
            min-height: 18px;
        }

        .area-observacoes {
            width: 100%;
            min-height: 30mm;
            border: 1.5px solid #000;
            padding: 2mm;
            font-size: 9pt;
            line-height: 1.4;
        }

        /* Estilos de impressão */
        @media print {
            @page {
                size: A4 portrait;
                margin: 0;
            }

            body {
                margin: 0;
                padding: 0;
            }

            .pagina-a4 {
                margin: 0;
                padding: 20mm 8mm 8mm 8mm;
                width: 210mm;
                height: 297mm;
            }

            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color: #000 !important;
            }

            .tabela-canhoto th,
            .tabela-produtos th {
                background: #e8e8e8 !important;
                -webkit-print-color-adjust: exact !important;
            }
        }

        @media print {
            html, body {
                height: 100%;
                overflow: hidden;
            }
        }
    </style>
</head>
<body>
    <div class="pagina-a4">
        <!-- Cabeçalho -->
        <div class="cabecalho">
            <img src="logo.png" alt="Logo Nagumo" class="logo-nagumo">
            <div class="titulo-documento">
                <h1>Controle de Recebimento FLV</h1>
            </div>
            <img src="logo.png" alt="Logo Nagumo" class="logo-nagumo">
        </div>

        <!-- TABELA DO CANHOTO - 6 COLUNAS COM LARGURAS IGUAIS -->
        <table class="tabela-canhoto">
            <thead>
                <tr>

                    <th>CARGAS</th>

            </thead>
            <tbody>
                <tr>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
            </tbody>
        </table>

        <!-- Tabela de Produtos - COLUNA QTDE BEM ESTREITA -->
        <table class="tabela-produtos">
            <thead>
                <tr>
                    <th class="produto-nome">Produto / Quantidade</th>
                    <th class="produto-qtde">Qtde Caixas</th>
                </tr>
            </thead>
            <tbody>
                <tr><td class="produto-nome"></td><td class="produto-qtde"></td></tr>
                <tr><td class="produto-nome"></td><td class="produto-qtde"></td></tr>
                <tr><td class="produto-nome"></td><td class="produto-qtde"></td></tr>
                <tr><td class="produto-nome"></td><td class="produto-qtde"></td></tr>
                <tr><td class="produto-nome"></td><td class="produto-qtde"></td></tr>
                <tr><td class="produto-nome"></td><td class="produto-qtde"></td></tr>
                <tr><td class="produto-nome"></td><td class="produto-qtde"></td></tr>
                <tr><td class="produto-nome"></td><td class="produto-qtde"></td></tr>
                <tr><td class="produto-nome"></td><td class="produto-qtde"></td></tr>
                <tr><td class="produto-nome"></td><td class="produto-qtde"></td></tr>
                <tr><td class="produto-nome"></td><td class="produto-qtde"></td></tr>
                <tr><td class="produto-nome"></td><td class="produto-qtde"></td></tr>
                <tr><td class="produto-nome"></td><td class="produto-qtde"></td></tr>
                <tr><td class="produto-nome"></td><td class="produto-qtde"></td></tr>
                <tr><td class="produto-nome"></td><td class="produto-qtde"></td></tr>
                <tr><td class="produto-nome"></td><td class="produto-qtde"></td></tr>
                <tr><td class="produto-nome"></td><td class="produto-qtde"></td></tr>
                <tr><td class="produto-nome"></td><td class="produto-qtde"></td></tr>
                <tr><td class="produto-nome"></td><td class="produto-qtde"></td></tr>
                <tr><td class="produto-nome"></td><td class="produto-qtde"></td></tr>
                <tr><td class="produto-nome"></td><td class="produto-qtde"></td></tr>
                <tr><td class="produto-nome"></td><td class="produto-qtde"></td></tr>
                <tr><td class="produto-nome"></td><td class="produto-qtde"></td></tr>
            </tbody>
        </table>

        <!-- Informações ABAIXO da tabela -->
        <div class="info-abaixo-tabela">
            <div class="campo-abaixo">
                <label>PBR:</label>
                <div class="linha"></div>
            </div>
            <div class="campo-abaixo">
                <label>Descartável:</label>
                <div class="linha"></div>
            </div>
            <div class="campo-abaixo">
                <label>Gaiola:</label>
                <div class="linha"></div>
            </div>
            <div class="campo-abaixo">
                <label>Total Paletes:</label>
                <div class="linha"></div>
            </div>
        </div>

        <!-- Observações no Final da Página MODIFICADA -->
        <div class="secao-observacoes">
            <div class="linha-observacoes">
                <label>Observações / Devoluções / Avarias:</label>
                <div class="conferente">
                    <label>Conferente:</label>
                    <div class="linha"></div>
                </div>
            </div>
            <div class="area-observacoes"></div>
        </div>
    </div>

    <script>
        window.addEventListener('load', function() {
            setTimeout(function() {
                window.print();
            }, 300);
        });

        window.addEventListener('afterprint', function() {
            window.close();
        });
    </script>
</body>
</html>
