<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Pesagens CD Nagumo</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Arial:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: white;
        }

        /* Estilos para a página A4 - MAIS ESPAÇO NO TOPO */
        .pagina-a4 {
            width: 210mm;
            height: 297mm;
            padding: 30mm 8mm 8mm 8mm; /* ↑ Aumentei de 10mm para 20mm no topo */
            margin: 0 auto;
            background: white;
            position: relative;
        }

        /* Cabeçalho com logos */
        .cabecalho {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8mm;
            padding-bottom: 3mm;
        }

        .logo-nagumo {
            width: 35mm;
            height: auto;
        }

        .titulo-documento {
            flex: 1;
            text-align: center;
            padding: 0 10mm;
        }

        .titulo-documento h1 {
            font-size: 13pt;
            font-weight: 900;
            color: #000;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin: 0;
            white-space: nowrap;
        }

        /* Grade de informações */
        .grade-informacoes {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3mm 5mm;
            margin-bottom: 5mm;
            font-size: 10pt;
        }

        .campo {
            display: flex;
            align-items: center;
            gap: 2mm;
        }

        .campo label {
            font-weight: 700;
            color: #000;
            white-space: nowrap;
            font-size: 9pt;
        }

        .campo .linha {
            flex: 1;
            border-bottom: 1px solid #000;
            min-height: 18px;
        }

        .campo-completo {
            grid-column: 1 / -1;
            margin-top: 3mm;
            margin-bottom: 3mm;
        }

        .campo-completo .linha {
            border-bottom: none;
        }

        /* Container das tabelas */
        .container-tabelas {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5mm;
            margin-bottom: 6mm;
        }

        /* Tabelas */
        .tabela {
            width: 100%;
            border-collapse: collapse;
            border: 1.5px solid #000;
        }

        .tabela th {
            background: #e8e8e8;
            border: 1px solid #000;
            padding: 3mm 3mm;
            text-align: center;
            font-weight: 900;
            font-size: 9pt;
            text-transform: uppercase;
            color: #000;
        }

        .tabela td {
            border: 1px solid #000;
            padding: 2.5mm 2mm;
            text-align: center;
            height: 7.5mm;
            font-size: 9pt;
        }

        /* Rodapé */
        .rodape {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5mm;
            margin-top: 5mm;
            font-size: 10pt;
        }

        .campo-rodape {
            display: flex;
            align-items: center;
            gap: 2mm;
        }

        .campo-rodape label {
            font-weight: 700;
            color: #000;
            white-space: nowrap;
            font-size: 9pt;
        }

        .campo-rodape .linha {
            flex: 1;
            border-bottom: 1.5px solid #000;
            min-height: 25px;
        }

        .assinatura-final {
            margin-top: 10mm;
            text-align: center;
        }

        .assinatura-final .linha-assinatura {
            width: 60%;
            margin: 0 auto 2mm;
            border-bottom: 1.5px solid #000;
            min-height: 25px;
        }

        .assinatura-final label {
            font-weight: 700;
            font-size: 9pt;
            color: #000;
        }

        /* Estilos de impressão */
        @media print {
            @page {
                size: A4 portrait;
                margin: 0;
            }

            body {
                margin: 0;
                padding: 0;
            }

            .pagina-a4 {
                margin: 0;
                padding: 30mm 8mm 8mm 8mm; /* ↑ Mantém o espaço extra no topo na impressão */
                width: 210mm;
                height: 297mm;
            }

            /* Forçar preto e branco */
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color: #000 !important;
            }

            .tabela th {
                background: #e8e8e8 !important;
                -webkit-print-color-adjust: exact !important;
            }
        }

        /* Remover espaçamentos extras na impressão */
        @media print {
            html, body {
                height: 100%;
                overflow: hidden;
            }
        }
    </style>
</head>
<body>

    <script>
        // Abrir impressão automaticamente ao carregar
        window.addEventListener('load', function() {
            // Pequeno delay para garantir que a página carregou completamente
            setTimeout(function() {
                window.print();
            }, 300);
        });

        // Fechar aba após impressão ou cancelamento
        window.addEventListener('afterprint', function() {
            window.close();
        });

        // Caso o usuário cancele a impressão, também fecha
        window.onbeforeunload = function() {
            return null;
        };
    </script>

</html>
