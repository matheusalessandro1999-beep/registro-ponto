<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercadorias Impróprias para Consumo - Nagumo</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'IBM Plex Mono', 'Courier Prime', monospace;
            background: linear-gradient(135deg, #f5f5f0 0%, #e8e8e0 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Efeito de papel vintage */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.015) 2px, rgba(0,0,0,.015) 4px);
            pointer-events: none;
            z-index: 1;
        }

        /* Container principal */
        .pagina-a4 {
            width: min(900px, 95vw);
            max-height: 95vh;
            padding: 3vh 4vw;
            margin: 0 auto;
            background: #fafaf5;
            position: relative;
            z-index: 2;
            box-shadow: 
                0 0 0 1px rgba(0,0,0,.1),
                0 20px 40px rgba(0,0,0,.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Cabeçalho Retrô com bordas duplas */
        .cabecalho {
            text-align: center;
            margin-bottom: 2vh;
            padding: 2vh 3vw;
            background: #ffffff;
            border: 4px double #000;
            position: relative;
            box-shadow: 
                inset 0 0 0 8px #fafaf5,
                inset 0 0 0 10px #000;
            flex-shrink: 0;
            margin-right: 90px; /* Ajuste este valor para alinhar com o formulário */
        }

        .cabecalho h1 {
            font-family: 'IBM Plex Mono', monospace;
            font-size: clamp(16px, 2.5vh, 22px);
            font-weight: 700;
            color: #000;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            line-height: 1.3;
            text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2vw;
        }

        .cabecalho h1::before,
        .cabecalho h1::after {
            content: '☠';
            font-size: clamp(20px, 3.5vh, 28px);
        }

        /* Container do formulário e botões */
        .formulario-wrapper {
            display: flex;
            gap: 2vw;
            flex: 1;
            min-height: 0;
        }

        /* Botões laterais em formato vertical - lado direito */
        .acoes-lateral {
            display: flex;
            flex-direction: column;
            gap: 2vh;
            flex-shrink: 0;
            justify-content: center;
            order: 2;
        }

        .formulario-container {
            order: 1;
        }

        .btn-acao {
            padding: 3vh 1.5vw;
            font-family: 'IBM Plex Mono', monospace;
            font-size: clamp(12px, 1.6vh, 14px);
            font-weight: 700;
            border: 3px solid #000;
            border-radius: 0;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.15s ease;
            box-shadow: 4px 4px 0px #000;
            position: relative;
            writing-mode: vertical-rl;
            text-orientation: upright;
            min-height: 18vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-acao:hover {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000;
        }

        .btn-acao:active {
            transform: translate(4px, 4px);
            box-shadow: 0 0 0 #000;
        }

        .btn-imprimir {
            background: #ffffff;
            color: #000;
        }

        .btn-limpar {
            background: #999999;
            color: #000000;
        }

        /* Formulário */
        .formulario-container {
            display: flex;
            flex-direction: column;
            gap: 1.5vh;
            background: #ffffff;
            padding: 2vh 2.5vw;
            border: 3px solid #000;
            box-shadow: 
                4px 4px 0px rgba(0, 0, 0, 0.2),
                inset 0 0 0 2px #fafaf5;
            flex: 1;
            overflow-y: auto;
            min-height: 0;
        }

        .campo-formulario {
            display: flex;
            flex-direction: column;
            gap: 0.8vh;
            position: relative;
        }

        .campo-formulario label {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 700;
            font-size: clamp(10px, 1.5vh, 13px);
            color: #000;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .campo-formulario label::before {
            content: '▸';
            font-size: clamp(9px, 1.3vh, 11px);
            color: #000;
        }

        .campo-formulario input,
        .campo-formulario textarea {
            padding: 1.2vh 1.5vw;
            font-size: clamp(13px, 1.8vh, 16px);
            border: 3px solid #000;
            border-radius: 0;
            font-family: 'Courier Prime', monospace;
            font-weight: 600;
            background: #ffffff;
            text-transform: uppercase;
            box-shadow: 
                inset 2px 2px 4px rgba(0, 0, 0, 0.1),
                2px 2px 0px rgba(0, 0, 0, 0.1);
            transition: all 0.2s ease;
            width: 100%;
        }

        .campo-formulario input {
            height: 5vh;
            min-height: 40px;
        }

        .campo-formulario textarea {
            min-height: 10vh;
            resize: vertical;
        }

        .campo-formulario input:focus,
        .campo-formulario textarea:focus {
            outline: none;
            border-color: #000;
            box-shadow: 
                inset 2px 2px 4px rgba(0, 0, 0, 0.15),
                0 0 0 4px rgba(0, 0, 0, 0.1);
            transform: translateY(-1px);
        }

        /* Campo em linha (Produto + PLU) */
        .campo-linha {
            display: flex;
            gap: 1.5vw;
            width: 100%;
        }

        .campo-produto {
            flex: 1 1 68%;
            min-width: 0;
        }

        .campo-plu {
            flex: 1 1 28%;
            min-width: 0;
        }

        /* Área de observações */
        .campo-observacoes {
            margin-top: 1vh;
        }

        .campo-observacoes label {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 700;
            font-size: clamp(10px, 1.5vh, 13px);
            color: #000;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 0.8vh;
        }

        .campo-observacoes label::before {
            content: '▸';
            font-size: clamp(9px, 1.3vh, 11px);
            color: #000;
        }

        .campo-observacoes textarea {
            width: 100%;
            min-height: 8vh;
            padding: 1.2vh 1.5vw;
            border: 3px solid #000;
            border-radius: 0;
            font-family: 'Courier Prime', monospace;
            font-size: clamp(13px, 1.8vh, 16px);
            font-weight: 600;
            resize: vertical;
            background: #ffffff;
            text-transform: uppercase;
            box-shadow: 
                inset 2px 2px 4px rgba(0, 0, 0, 0.1),
                2px 2px 0px rgba(0, 0, 0, 0.1);
            transition: all 0.2s ease;
        }

        .campo-observacoes textarea:focus {
            outline: none;
            border-color: #000;
            box-shadow: 
                inset 2px 2px 4px rgba(0, 0, 0, 0.15),
                0 0 0 4px rgba(0, 0, 0, 0.1);
            transform: translateY(-1px);
        }

        /* Decoração retrô no rodapé */
        .footer-retro {
            text-align: center;
            font-family: 'IBM Plex Mono', monospace;
            font-size: clamp(7px, 1vh, 9px);
            font-weight: 600;
            color: #666;
            letter-spacing: 2px;
            padding-top: 1.5vh;
            margin-top: 1vh;
            flex-shrink: 0;
        }

        /* Estilos de impressão */
        @media print {
            @page {
                size: A4 portrait;
                margin: 0;
            }

            body {
                margin: 0;
                padding: 0;
                background: white;
            }

            body::before {
                display: none;
            }

            .pagina-a4 {
                margin: 0;
                padding: 20mm 15mm;
                width: 210mm;
                height: 297mm;
                background: white;
                box-shadow: none;
                max-height: none;
                overflow: visible;
            }

            .cabecalho {
                text-align: center;
                margin-bottom: 10mm;
                padding-bottom: 3mm;
                border-bottom: 3px solid #000;
                border: none;
                border-bottom: 3px solid #000;
                box-shadow: none;
                position: relative;
                margin-right: 0;
            }

            .cabecalho h1 {
                font-family: 'Special Elite', 'Courier Prime', monospace;
                font-size: 22pt;
                font-weight: 900;
                color: #000;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin: 0;
                line-height: 1;
                white-space: nowrap;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8mm;
                transform: scaleX(0.85);
            }

            .cabecalho h1::before,
            .cabecalho h1::after {
                content: '☠';
                font-size: 34pt;
                transform: scaleX(1.18);
            }

            .formulario-wrapper {
                display: block;
            }

            .acoes-lateral {
                display: none;
            }

            .formulario-container {
                display: flex;
                flex-direction: column;
                gap: 8mm;
                background: white;
                border: none;
                box-shadow: none;
                padding: 0;
            }

            .campo-linha {
                display: flex;
                gap: 5mm;
            }

            .campo-produto {
                flex: 0 0 70%;
            }

            .campo-plu {
                flex: 0 0 calc(30% - 5mm);
            }

            .campo-formulario {
                display: flex;
                flex-direction: column;
                gap: 2mm;
            }

            .campo-formulario label {
                font-family: 'Special Elite', 'Courier Prime', monospace;
                font-weight: 900;
                font-size: 16pt;
                color: #000;
                text-transform: uppercase;
                letter-spacing: 0.3px;
            }

            .campo-formulario label::before {
                content: '';
            }

            .campo-formulario input,
            .campo-formulario textarea {
                width: 100%;
                padding: 4mm;
                border: 1px solid #000;
                border-radius: 4px;
                font-family: 'Courier Prime', monospace;
                font-size: 20pt;
                font-weight: 700;
                background: white;
                text-transform: uppercase;
                box-shadow: none;
            }

            .campo-formulario input {
                height: 16mm;
            }

            .campo-formulario textarea {
                min-height: 30mm;
                resize: vertical;
            }

            .campo-observacoes {
                margin-top: 5mm;
            }

            .campo-observacoes label {
                font-family: 'Special Elite', 'Courier Prime', monospace;
                font-weight: 900;
                font-size: 16pt;
                color: #000;
                text-transform: uppercase;
                letter-spacing: 0.3px;
                display: block;
                margin-bottom: 2mm;
            }

            .campo-observacoes label::before {
                content: '';
            }

            .campo-observacoes textarea {
                width: 100%;
                min-height: 45mm;
                padding: 4mm;
                border: 1px solid #000;
                border-radius: 4px;
                font-family: 'Courier Prime', monospace;
                font-size: 18pt;
                font-weight: 700;
                resize: vertical;
                background: white;
                text-transform: uppercase;
                box-shadow: none;
            }

            .footer-retro {
                display: none;
            }

            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color: #000 !important;
            }

            .campo-formulario input,
            .campo-formulario textarea,
            .campo-observacoes textarea {
                border: 1px solid #000 !important;
                background: white !important;
                -webkit-appearance: none;
                -moz-appearance: none;
                appearance: none;
            }
        }

        @media print {
            html, body {
                height: 100%;
                overflow: hidden;
            }
        }

        /* Animação sutil */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .formulario-container {
            animation: fadeIn 0.4s ease-out;
        }
    </style>
</head>
<body>
    <div class="pagina-a4">
        <!-- Cabeçalho -->
        <div class="cabecalho">
            <h1>Mercadorias Impróprias para Consumo</h1>
        </div>

        <!-- Wrapper com Botões Laterais + Formulário -->
        <div class="formulario-wrapper">
            <!-- Botões Laterais em Formato Vertical -->
            <div class="acoes-lateral">
                <button class="btn-acao btn-imprimir" onclick="imprimirFormulario()">
                    IMPRIMIR
                </button>
                <button class="btn-acao btn-limpar" onclick="limparFormulario()">
                    LIMPAR
                </button>
            </div>

            <!-- Formulário -->
            <div class="formulario-container">
                <!-- Linha Produto + PLU -->
                <div class="campo-linha">
                    <div class="campo-formulario campo-produto">
                        <label for="produto">Produto:</label>
                        <input type="text" id="produto" name="produto">
                    </div>

                    <div class="campo-formulario campo-plu">
                        <label for="plu">PLU:</label>
                        <input type="text" id="plu" name="plu">
                    </div>
                </div>

                <div class="campo-formulario">
                    <label for="data-recebimento">Data de Recebimento:</label>
                    <input type="date" id="data-recebimento" name="data-recebimento">
                </div>

                <div class="campo-formulario">
                    <label for="data-validade">Data de Validade:</label>
                    <input type="date" id="data-validade" name="data-validade">
                </div>

                <div class="campo-formulario">
                    <label for="loja-enviou">Loja que Enviou:</label>
                    <input type="text" id="loja-enviou" name="loja-enviou">
                </div>

                <div class="campo-formulario">
                    <label for="conferido-por">Conferido Por:</label>
                    <input type="text" id="conferido-por" name="conferido-por">
                </div>

                <div class="campo-observacoes">
                    <label for="observacoes">Observações:</label>
                    <textarea id="observacoes" name="observacoes"></textarea>
                </div>
            </div>
        </div>

        <!-- Rodapé -->
        <div class="footer-retro">
            CD NAGUMO - FLV | CONTROLE DE QUALIDADE
        </div>
    </div>

    <script>
        function imprimirFormulario() {
            window.print();
        }

        function limparFormulario() {
            if (confirm('🗑 Deseja realmente limpar todos os campos?')) {
                document.getElementById('produto').value = '';
                document.getElementById('plu').value = '';
                document.getElementById('data-recebimento').value = '';
                document.getElementById('data-validade').value = '';
                document.getElementById('loja-enviou').value = '';
                document.getElementById('conferido-por').value = '';
                document.getElementById('observacoes').value = '';
            }
        }

        // Converter texto para maiúsculas automaticamente em todos os campos
        const camposTexto = document.querySelectorAll('input[type="text"], textarea');
        
        camposTexto.forEach(campo => {
            campo.addEventListener('input', function() {
                const start = this.selectionStart;
                const end = this.selectionEnd;
                this.value = this.value.toUpperCase();
                this.setSelectionRange(start, end);
            });
        });

        // Preencher data atual no campo de recebimento ao carregar
        window.addEventListener('load', function() {
            const hoje = new Date().toISOString().split('T')[0];
            document.getElementById('data-recebimento').value = hoje;
        });

        // Foco automático no primeiro campo
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('produto').focus();
        });
    </script>
</body>
</html>
