<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identificação com Código de Barras - Nagumo</title>
    <script>
        // Carregamento otimizado da biblioteca JsBarcode
        (function() {
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js';
            script.async = true;
            script.defer = true;
            document.head.appendChild(script);
        })();
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'IBM Plex Mono', 'Courier Prime', monospace;
            background: linear-gradient(135deg, #f5f5f0 0%, #e8e8e0 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Efeito de papel vintage */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.015) 2px, rgba(0,0,0,.015) 4px);
            pointer-events: none;
            z-index: 1;
        }

        /* Previne FOUC */
        .input-screen {
            opacity: 1;
        }

        /* Tela de Entrada - Design Retrô Clean */
        .input-screen {
            width: min(900px, 95vw);
            max-height: 95vh;
            padding: 3vh 4vw;
            margin: 0 auto;
            background: #fafaf5;
            position: relative;
            z-index: 2;
            box-shadow: 
                0 0 0 1px rgba(0,0,0,.1),
                0 20px 40px rgba(0,0,0,.15);
            display: flex;
            flex-direction: column;
        }

        /* Cabeçalho Retrô com bordas duplas - SEM linhas pontilhadas */
        .header {
            text-align: center;
            margin-bottom: 3vh;
            padding: 2vh 3vw;
            background: #ffffff;
            border: 4px double #000;
            position: relative;
            box-shadow: 
                inset 0 0 0 8px #fafaf5,
                inset 0 0 0 10px #000;
            flex-shrink: 0;
        }

        .header h1 {
            font-family: 'IBM Plex Mono', monospace;
            font-size: clamp(18px, 3vh, 24px);
            font-weight: 700;
            color: #000;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            line-height: 1.3;
            text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.1);
        }

        .form-container {
            display: flex;
            flex-direction: column;
            gap: 2vh;
            background: #ffffff;
            padding: 3vh 3vw;
            border: 3px solid #000;
            box-shadow: 
                4px 4px 0px rgba(0, 0, 0, 0.2),
                inset 0 0 0 2px #fafaf5;
            flex-grow: 1;
            overflow-y: auto;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1vh;
            position: relative;
        }

        .input-group label {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 700;
            font-size: clamp(11px, 1.8vh, 14px);
            color: #000;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .input-group label::before {
            content: '▸';
            font-size: clamp(9px, 1.5vh, 12px);
            color: #000;
        }

        .input-group input {
            padding: 1.5vh 2vw;
            font-size: clamp(14px, 2vh, 18px);
            border: 3px solid #000;
            border-radius: 0;
            font-family: 'Courier Prime', monospace;
            font-weight: 600;
            background: #ffffff;
            height: 6vh;
            text-transform: uppercase;
            box-shadow: 
                inset 2px 2px 4px rgba(0, 0, 0, 0.1),
                2px 2px 0px rgba(0, 0, 0, 0.1);
            transition: all 0.2s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #000;
            box-shadow: 
                inset 2px 2px 4px rgba(0, 0, 0, 0.15),
                0 0 0 4px rgba(0, 0, 0, 0.1);
            transform: translateY(-1px);
        }

        .input-group input::placeholder {
            color: #999;
            font-weight: 400;
            font-style: italic;
        }

        .btn-container {
            display: flex;
            gap: 2vw;
            margin-top: 2vh;
            justify-content: center;
            flex-shrink: 0;
        }

        .btn {
            padding: 1.5vh 4vw;
            font-family: 'IBM Plex Mono', monospace;
            font-size: clamp(10px, 1.6vh, 13px);
            font-weight: 700;
            border: 3px solid #000;
            border-radius: 0;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.15s ease;
            box-shadow: 4px 4px 0px #000;
            position: relative;
        }

        .btn:hover {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000;
        }

        .btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0 0 0 #000;
        }

        .btn-gerar {
            background: #ffffff;
            color: #000;
        }

        .btn-limpar {
            background: #000;
            color: #ffffff;
        }

        /* Página de Impressão A4 */
        .print-page {
            display: none;
        }

        @media print {
            body {
                background: white;
                margin: 0;
                padding: 0;
            }

            body::before {
                display: none;
            }

            .input-screen {
                display: none;
            }

            .print-page {
                display: block;
                width: 210mm;
                height: 297mm;
                padding: 25mm 20mm;
                margin: 0;
                background: white;
                page-break-after: always;
            }

            @page {
                size: A4 portrait;
                margin: 0;
            }
        }

        /* Conteúdo da Impressão */
        .print-content {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .print-line {
            font-family: Arial, sans-serif;
            font-weight: 600;
            color: #000;
            margin: 0;
            line-height: 1.2;
            text-transform: uppercase;
            white-space: nowrap;
            width: 100%;
            text-align: center;
        }

        .print-line.container {
            font-size: 52pt;
            margin-bottom: 12mm;
        }

        .print-line.plu {
            font-size: 52pt;
            margin-bottom: 12mm;
        }

        .print-line.produto {
            font-size: 48pt;
            margin-bottom: 12mm;
            line-height: 1.3;
            max-width: 90%;
            white-space: normal;
            word-wrap: break-word;
            margin-left: auto;
            margin-right: auto;
        }

        .print-line.validade-label {
            font-size: 52pt;
            margin-bottom: 3mm;
        }

        .print-line.validade-data {
            font-size: 52pt;
            margin-bottom: 15mm;
        }

        .barcode-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
            width: 100%;
        }

        #barcode-print {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .barcode-text {
            font-family: 'Courier New', monospace;
            font-size: 20pt;
            font-weight: 400;
            color: #000;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-align: center;
            width: 100%;
            margin-top: 2mm;
        }

        /* Decoração retrô no rodapé - SEM linhas pontilhadas */
        .footer-retro {
            text-align: center;
            font-family: 'IBM Plex Mono', monospace;
            font-size: clamp(8px, 1.2vh, 10px);
            font-weight: 600;
            color: #666;
            letter-spacing: 2px;
            padding-top: 2vh;
            margin-top: 2vh;
            flex-shrink: 0;
        }

        /* Animação sutil */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-container {
            animation: fadeIn 0.4s ease-out;
        }
    </style>
</head>
<body>
    <!-- Tela de Entrada -->
    <div class="input-screen" id="inputScreen">
        <div class="header">
            <h1>Placas com Código de Barras</h1>
        </div>

        <div class="form-container">
            <div class="input-group">
                <label for="container">Container:</label>
                <input type="text" id="container" placeholder="Digite o container" maxlength="10">
            </div>

            <div class="input-group">
                <label for="plu">PLU:</label>
                <input type="text" id="plu" placeholder="Digite o PLU" maxlength="25">
            </div>

            <div class="input-group">
                <label for="produto">Produto:</label>
                <input type="text" id="produto" placeholder="Digite o produto" maxlength="100">
            </div>

            <div class="input-group">
                <label for="validade">Validade:</label>
                <input type="text" id="validade" placeholder="Digite a data de validade" maxlength="10">
            </div>

            <div class="btn-container">
                <button class="btn btn-gerar" onclick="gerarImpressao()">
                    ▶ Gerar Impressão
                </button>
                <button class="btn btn-limpar" onclick="limparCampos()">
                    ✖ Limpar
                </button>
            </div>
        </div>

        <div class="footer-retro">
            CD NAGUMO - FLV | SISTEMA DE IDENTIFICAÇÃO
        </div>
    </div>

    <!-- Página de Impressão -->
    <div class="print-page" id="printPage">
        <div class="print-content">
            <p class="print-line container" id="print-container"></p>
            
            <p class="print-line plu" id="print-plu"></p>
            
            <p class="print-line produto" id="print-produto"></p>
            
            <p class="print-line validade-label">VALIDADE</p>
            <p class="print-line validade-data" id="print-validade"></p>
            
            <div class="barcode-section">
                <svg id="barcode-print"></svg>
                <p class="barcode-text" id="barcode-text"></p>
            </div>
        </div>
    </div>

    <script>
        // Máscara automática para data de validade
        const validadeInput = document.getElementById('validade');
        
        validadeInput.addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            
            if (value.length >= 2) {
                value = value.substring(0, 2) + '/' + value.substring(2);
            }
            if (value.length >= 5) {
                value = value.substring(0, 5) + '/' + value.substring(5, 9);
            }
            
            e.target.value = value;
        });

        function gerarImpressao() {
            const container = document.getElementById('container').value.trim().toUpperCase();
            const plu = document.getElementById('plu').value.trim().toUpperCase();
            const produto = document.getElementById('produto').value.trim().toUpperCase();
            const validade = document.getElementById('validade').value.trim();

            // Validações
            if (!container) {
                alert('⚠️ Por favor, preencha o campo Container!');
                document.getElementById('container').focus();
                return;
            }

            if (!plu) {
                alert('⚠️ Por favor, preencha o campo PLU!');
                document.getElementById('plu').focus();
                return;
            }

            if (!produto) {
                alert('⚠️ Por favor, preencha o campo Produto!');
                document.getElementById('produto').focus();
                return;
            }

            if (!validade) {
                alert('⚠️ Por favor, preencha o campo Validade!');
                document.getElementById('validade').focus();
                return;
            }

            // Validação do PLU para código de barras
            if (!/^[A-Za-z0-9\-_.]+$/.test(plu)) {
                alert('⚠️ O PLU deve conter apenas letras, números e os caracteres: - _ .');
                document.getElementById('plu').focus();
                return;
            }

            // Preencher os dados da impressão
            document.getElementById('print-container').textContent = `CONTAINER - ${container}`;
            document.getElementById('print-plu').textContent = `PLU: ${plu}`;
            document.getElementById('print-produto').textContent = produto;
            document.getElementById('print-validade').textContent = validade;
            document.getElementById('barcode-text').textContent = plu;

            // Gerar código de barras
            try {
                // Verifica se a biblioteca JsBarcode está carregada
                if (typeof JsBarcode === 'undefined') {
                    alert('⏳ Aguarde, carregando biblioteca de códigos de barras...');
                    return;
                }

                JsBarcode("#barcode-print", plu, {
                    format: "CODE128",
                    displayValue: false,
                    width: 3,
                    height: 90,
                    background: "transparent",
                    lineColor: "#1e293b",
                    margin: 10
                });

                // Aguardar um momento e imprimir
                setTimeout(() => {
                    window.print();
                }, 500);

            } catch (error) {
                console.error('Erro ao gerar código de barras:', error);
                alert('❌ Erro ao gerar o código de barras. Verifique o PLU informado.');
            }
        }

        function limparCampos() {
            if (confirm('🗑 Deseja realmente limpar todos os campos?')) {
                document.getElementById('container').value = '';
                document.getElementById('plu').value = '';
                document.getElementById('produto').value = '';
                document.getElementById('validade').value = '';
                document.getElementById('container').focus();
            }
        }

        // Permitir Enter para avançar entre campos
        const inputs = document.querySelectorAll('input');
        inputs.forEach((input, index) => {
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    } else {
                        gerarImpressao();
                    }
                }
            });
        });

        // Foco automático no primeiro campo assim que a página carregar
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('container').focus();
        });
    </script>
</body>
</html>
