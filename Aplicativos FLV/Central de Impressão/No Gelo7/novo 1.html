<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Carregamento Perecíveis - Nagumo</title>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
   
    <style>
 @import url('https://fonts.googleapis.com/css2?family=Arial:wght@400;700;900&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #f5f7fa 0%, #e8edf2 100%);
}

/* ========================================
   CONFIGURAÇÕES DA PÁGINA A4
   ======================================== */
.pagina-a4 {
    width: 210mm;
    min-height: 297mm;
    padding: 8mm 5mm 3mm 5mm;
    margin: 0 auto;
    background: white;
    position: relative;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    border-radius: 4px;
}

/* ========================================
   CABEÇALHO
   ======================================== */
.top-header {
    background: linear-gradient(135deg, #BFBFBF 0%, #A8A8A8 100%);
    border: 0.3px solid #666;
    border-radius: 6px;
    padding: 5px;
    text-align: center;
    font-weight: 900;
    margin-bottom: 5px;
    font-size: 16pt;
    text-transform: uppercase;
    margin-top: 5px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    letter-spacing: 0.5px;
}

.header-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 3px;
}

.logo-container img {
    height: 15px;
    filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.1));
}

.date-field {
    font-weight: 700;
    font-size: 7pt;
}

/* ========================================
   TABELA PRINCIPAL
   ======================================== */
table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    margin-bottom: 0;
}

/* ========================================
   CABEÇALHO DUPLO DA TABELA
   ======================================== */
.header-grupo {
    background: linear-gradient(135deg, #BFBFBF 0%, #A8A8A8 100%);
    font-weight: 900;
    text-align: center;
    padding: 0.8mm;
    border: 0.3px solid #666;
    font-size: 10pt;
    text-transform: uppercase;
    line-height: 1;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2);
    border-radius: 4px;
}

.header-grupo-carregamento {
    background: linear-gradient(135deg, #D9D9D9 0%, #C5C5C5 100%);
    font-weight: 900;
    text-align: center;
    padding: 0.8mm;
    border: 0.3px solid #666;
    font-size: 8pt;
    text-transform: uppercase;
    line-height: 1;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.3);
    border-radius: 4px;
}

/* Linha em branco entre cabeçalhos duplos */
.blank-header-row td {
    border: none;
    height: 1.5mm;
    background-color: white;
    padding: 0;
}

/* ========================================
   CABEÇALHOS DAS COLUNAS (th)
   ======================================== */
th {
    background: linear-gradient(135deg, #BFBFBF 0%, #A8A8A8 100%);
    border: 0.3px solid #666;
    padding: 0.2mm 0.3mm;
    text-align: center;
    vertical-align: middle;
    font-weight: 900;
    font-size: 6pt;
    text-transform: uppercase;
    color: #000;
    line-height: 0.9;
    height: 5.5mm;
    background-clip: padding-box;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2);
    transition: all 0.2s ease;
    border-radius: 2px;
}

th:hover {
    background: linear-gradient(135deg, #CACACA 0%, #B3B3B3 100%);
}

/* ========================================
   LARGURAS DAS COLUNAS - AJUSTE AQUI
   ======================================== */
th:nth-child(1) {
    width: 25mm;  /* Região */
}

th:nth-child(2) {
    width: 12mm;  /* Lojas - ← AUMENTADO */
}

th:nth-child(3) {
    width: 12mm;  /* Qtde Paletes - ← NOVO */
}

th:nth-child(4) {
    width: 12mm;  /* Box - ← AUMENTADO */
}

th:nth-child(5) {
    width: 12mm;  /* Container - ← NOVO */
}

th:nth-child(6) {
    width: 12mm;  /* Câmara - ← NOVO */
}

th:nth-child(7) {
    width: 16mm;  /* Total Rota */
}

th:nth-child(8) {
    width: 20mm;  /* Região (Carregamento) - ← NOVO */
}

th:nth-child(9) {
    width: 50mm;  /* Motorista/Placa - ← AUMENTADO */
}

th:nth-child(10) {
    width: 10mm;  /* C° */
}

/* Colunas da seção CARREGAMENTO */
th:nth-child(8),
th:nth-child(9),
th:nth-child(10) {
    background: linear-gradient(135deg, #D9D9D9 0%, #C5C5C5 100%);
}

/* Coluna Total Rota */
.total-rota-header {
    background: linear-gradient(135deg, #BFBFBF 0%, #A8A8A8 100%) !important;
    width: 16mm;
}

/* ========================================
   CÉLULAS DA TABELA (td)
   ======================================== */
td {
    padding: 0.15mm 0.3mm;
    text-align: center;
    vertical-align: middle;
    font-size: 8pt;
    border: 0.3px solid #999;
    line-height: 0.9;
    height: 4.0mm;
    transition: background-color 0.15s ease;
    border-radius: 2px;
    background-color: white;
}

td:hover {
    background-color: #f8f9fa;
}

td:nth-child(1) {
    width: 25mm;  /* Região */
}

td:nth-child(2) {
    width: 12mm;  /* Lojas - ← AUMENTADO */
}

td:nth-child(3) {
    width: 12mm;  /* Qtde Paletes - ← NOVO */
}

td:nth-child(4) {
    width: 12mm;  /* Box - ← AUMENTADO */
}

td:nth-child(5) {
    width: 12mm;  /* Container - ← NOVO */
}

td:nth-child(6) {
    width: 12mm;  /* Câmara - ← NOVO */
}

td:nth-child(7) {
    width: 16mm;  /* Total Rota */
}

td:nth-child(8) {
    width: 20mm;  /* Região (Carregamento) - ← NOVO */
}

td:nth-child(9) {
    width: 50mm;  /* Motorista/Placa - ← AUMENTADO */
    white-space: pre-wrap;
    word-wrap: break-word;
    line-height: 1.2;
    padding: 0.5mm 0.3mm;
}

td:nth-child(10) {
    width: 10mm;  /* C° */
}

/* Forçar textareas de Praia Grande e Rio de Janeiro a terem altura fixa */
tr:has(.region-header:not([rowspan])) .motorista-placa-textarea,
tr:has(.region-header[rowspan="1"]) .motorista-placa-textarea,
tr:has(.region-header[rowspan="2"]) .motorista-placa-textarea {
    max-height: 4.0mm !important;
    min-height: 4.0mm !important;
    line-height: 0.9 !important;
    font-size: 8pt !important;
}

/* ========================================
   CORREÇÃO DE ALTURA - PRAIA GRANDE E RIO DE JANEIRO
   ======================================== */

/* Forçar altura padrão para linhas simples */
tr:has(.region-header:not([rowspan])) td,
tr:has(.region-header[rowspan="1"]) td,
tr:has(.region-header[rowspan="2"]) td {
    height: 4.0mm !important;
    max-height: 4.0mm !important;
    min-height: 4.0mm !important;
    padding: 0.15mm 0.3mm !important;
    vertical-align: middle !important;
    line-height: 0.9 !important;
}

/* Forçar nas células mescladas também */
tr:has(.region-header:not([rowspan])) .merged-cell,
tr:has(.region-header[rowspan="1"]) .merged-cell,
tr:has(.region-header[rowspan="2"]) .merged-cell {
    height: 4.0mm !important;
    max-height: 4.0mm !important;
    min-height: 4.0mm !important;
}

/* Garantir que a linha inteira respeite */
tr:has(.region-header:not([rowspan])),
tr:has(.region-header[rowspan="1"]),
tr:has(.region-header[rowspan="2"]) {
    height: 4.0mm !important;
    min-height: 4.0mm !important;
    max-height: 4.0mm !important;
}

/* Forçar nos elementos internos */
tr:has(.region-header:not([rowspan])) *,
tr:has(.region-header[rowspan="1"]) *,
tr:has(.region-header[rowspan="2"]) * {
    line-height: 0.9 !important;
}

/* ========================================
   ESPAÇAMENTO ENTRE GRUPOS DE COLUNAS
   ======================================== */
.col-group-1 {
    border-right: 2px solid #666;
    width: 25mm;  /* ← Mantém região larga */
}

.col-group-2 {
    border-right: 2px solid #666;
}

.col-group-3 {
    background: linear-gradient(135deg, #BFBFBF 0%, #A8A8A8 100%);
    background-clip: padding-box;
    border-right: 2px solid #666;
    width: 16mm;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.15);
    border-radius: 2px;
}

.col-group-3 input {
    font-weight: 900;
    font-size: 9pt;
    color: #000;
}

/* ========================================
   LINHAS EM BRANCO ENTRE REGIÕES
   ======================================== */
.blank-row {
    height: 1.5mm;
    background-color: white;
}

.blank-row td {
    border: none;
    padding: 0;
    height: 1.5mm;
}

/* ========================================
   CÉLULAS ESPECIAIS
   ======================================== */
.region-header {
    background: linear-gradient(135deg, #BFBFBF 0%, #A8A8A8 100%);
    font-weight: 900;
    text-align: center;
    vertical-align: middle;
    background-clip: padding-box;
    width: 18mm;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2);
    transition: all 0.2s ease;
    border-radius: 2px;
}

.region-header:hover {
    background: linear-gradient(135deg, #CACACA 0%, #B3B3B3 100%);
}

.store-cell {
    text-align: center;
    vertical-align: middle;
    padding-left: 0.3mm;
    width: 12mm;  /* ← AUMENTADO */
    font-weight: 600;
}

.merged-cell {
    background-color: #f9f9f9;
    vertical-align: middle;
    text-align: center;
    transition: background-color 0.15s ease;
    border-radius: 2px;
}

.merged-cell:hover {
    background-color: #f0f0f0;
}

.merged-cell:nth-child(8) {
    background: linear-gradient(135deg, #D9D9D9 0%, #C5C5C5 100%);
    font-weight: 900;
}

.merged-cell:nth-child(10) {
    width: 10mm;
}

/* ========================================
   ESTILOS PARA TEXTAREA MOTORISTA/PLACA
   ======================================== */
.motorista-placa-textarea {
    width: 100%;
    height: 100%;
    border: none;
    background: transparent;
    text-align: center;
    font-size: 9pt;
    font-family: Arial, sans-serif;
    font-weight: 700;
    padding: 2px;
    margin: 0;
    outline: none;
    resize: none;
    overflow: hidden;
    white-space: pre-wrap;
    word-wrap: break-word;
    line-height: 1.2;
    vertical-align: middle;
    transition: all 0.2s ease;
    text-transform: uppercase;
}

.motorista-placa-textarea:focus {
    background-color: rgba(100, 149, 237, 0.08);
    border-radius: 2px;
}

/* ========================================
   ESTILOS DE IMPRESSÃO
   ======================================== */
@media print {
    @page {
        size: A4 portrait;
        margin: 0;
    }
    
    body {
        margin: 0;
        padding: 0;
        background: white;
    }
    
    .pagina-a4 {
        margin: 0;
        padding: 8mm 5mm 3mm 5mm;
        width: 210mm;
        min-height: auto;
        box-shadow: none;
        border-radius: 0;
        page-break-after: auto;
    }
    
    table {
        page-break-inside: auto;
        border-collapse: collapse !important;
    }
    
    tr {
        page-break-inside: avoid;
        page-break-after: auto;
    }
    
    .blank-row td,
    .blank-header-row td {
        border: none !important;
        background: white !important;
    }
    
    * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        color: #000 !important;
    }
    
    .top-header,
    .header-grupo,
    .region-header,
    th {
        background: #BFBFBF !important;
        background-clip: padding-box !important;
        -webkit-print-color-adjust: exact !important;
        border: 0.3px solid #666 !important;
    }
    
    .header-grupo-carregamento,
    th:nth-child(8),
    th:nth-child(9),
    th:nth-child(10),
    .merged-cell:nth-child(8) {
        background: #D9D9D9 !important;
        -webkit-print-color-adjust: exact !important;
        border: 0.3px solid #666 !important;
    }
    
    .merged-cell {
        background: #f9f9f9 !important;
        -webkit-print-color-adjust: exact !important;
        border: 0.3px solid #999 !important;
        border-radius: 2px !important;
    }
    
    td {
        border: 0.3px solid #999 !important;
        border-radius: 2px !important;
        background-color: white !important;
        border-collapse: collapse !important;
        box-sizing: border-box !important;
    }
    
    th {
        border-collapse: collapse !important;
        box-sizing: border-box !important;
    }
    
    .total-rota-header {
        background: #BFBFBF !important;
        -webkit-print-color-adjust: exact !important;
        border: 0.3px solid #666 !important;
    }
    
    .col-group-3 {
        background: #BFBFBF !important;
        background-clip: padding-box !important;
        -webkit-print-color-adjust: exact !important;
        border-radius: 2px !important;
    }
    
    .col-group-1,
    .col-group-2 {
        background-clip: padding-box !important;
    }
    
    .col-group-1 {
        border-right: 2px solid #666 !important;
    }
    
    .col-group-2 {
        border-right: 2px solid #666 !important;
    }
    
    .controls {
        display: none !important;
    }
    
    input, textarea {
        border: none !important;
        background: transparent !important;
        box-shadow: none !important;
        outline: none !important;
    }
    
    td:nth-child(9) {
        white-space: pre-wrap !important;
        line-height: 1.2 !important;
    }
    
    td:hover,
    .merged-cell:hover,
    .region-header:hover,
    th:hover {
        background-color: inherit !important;
    }
    
    tbody tr {
        page-break-inside: avoid !important;
        break-inside: avoid !important;
    }
    
    .region-header[rowspan] {
        page-break-inside: avoid !important;
        break-inside: avoid !important;
        border-collapse: collapse !important;
        box-sizing: border-box !important;
    }
    
    tbody tr:has(.region-header[rowspan="7"]),
    tbody tr:has(.region-header[rowspan="7"]) ~ tr:nth-of-type(-n+6) {
        page-break-inside: avoid !important;
        break-inside: avoid !important;
        border-collapse: collapse !important;
    }
    
    .total-caminhoes-display {
        display: none !important;
    }
}

@media print {
    html, body {
        height: auto;
        overflow: visible;
    }
	
	/* Forçar impressão da célula Taubaté/Lorena */
    td.merged-cell[style*="D9D9D9"] {
        background: #D9D9D9 !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
    }
}


/* ========================================
   ESTILOS PARA ELEMENTOS EDITÁVEIS
   ======================================== */
input {
    width: 100%;
    height: 100%;
    border: none;
    background: transparent;
    text-align: center;
    font-size: 8pt;
    font-family: Arial, sans-serif;
    padding: 0;
    margin: 0;
    outline: none;
    transition: all 0.2s ease;
    border-radius: 2px;
}

input:focus {
    background-color: rgba(100, 149, 237, 0.08);
    box-shadow: inset 0 0 0 1px rgba(100, 149, 237, 0.3);
}

input[type="number"] {
    -moz-appearance: textfield;
}

input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
}

input[type="text"] {
    text-align: center;
}

.merged-cell input {
    background-color: transparent;
}

.merged-cell input:focus {
    background-color: rgba(100, 149, 237, 0.08);
}


.controls button#manageBtn {
    background: #000000;
    padding: 6px;
}

.controls button#manageBtn:hover {
    background: #1a1a1a;
    transform: translateY(-3px) scale(1.08);
}

.controls button#manageBtn svg {
    filter: brightness(0) invert(1);
}

/* ========================================
   MODAL DE GERENCIAMENTO - DESIGN PROFISSIONAL
   ======================================== */

.modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    z-index: 2000;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.modal-container {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #ffffff;
    width: 380px;
    max-width: 90vw;
    height: 720px;
    max-height: 95vh;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    overflow: hidden;  /* CERTIFIQUE-SE QUE TEM ESTA LINHA */
    z-index: 2001;
    animation: slideUp 0.3s ease;
    display: flex;
    flex-direction: column;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translate(-50%, -45%);
    }
    to {
        opacity: 1;
        transform: translate(-50%, -50%);
    }
}

.modal-header {
    background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
    color: #ffffff;
    padding: 24px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.modal-header h2 {
    margin: 0;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.modal-close {
    background: rgba(255, 255, 255, 0.1);
    border: none;
    color: #ffffff;
    font-size: 28px;
    cursor: pointer;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: all 0.2s ease;
    font-weight: 300;
}

.modal-close:hover {
    background: rgba(255, 255, 255, 0.2);
    transform: scale(1.1);
}

.modal-close:active {
    transform: scale(0.95);
}

.modal-body {
    padding: 0;
    background: #f8f9fa;
    flex: 1;
    overflow-y: auto;  /* ← ALTERAÇÃO: permite scroll */
    display: flex;
    flex-direction: column;
}

/* Scrollbar moderna estilo iOS */
.modal-body::-webkit-scrollbar {
    width: 8px;
}

.modal-body::-webkit-scrollbar-track {
    background: transparent;
}

.modal-body::-webkit-scrollbar-thumb {
    background: rgba(0, 0, 0, 0.2);
    border-radius: 10px;
}

.modal-body::-webkit-scrollbar-thumb:hover {
    background: rgba(0, 0, 0, 0.3);
}

.region-section {
    margin-bottom: 24px;
    border-radius: 16px;
    padding: 20px;
    background: #ffffff;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    transition: all 0.2s ease;
}

.region-section:hover {
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
}

.region-section h3 {
    margin: 0 0 16px 0;
    font-size: 17px;
    color: #1a1a1a;
    font-weight: 600;
    letter-spacing: -0.3px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding-bottom: 12px;
    border-bottom: 2px solid #f0f0f0;
}

.stores-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;
}

.store-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #f8f9fa;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid #e8e8e8;
    transition: all 0.2s ease;
}

.store-item:hover {
    background: #ffffff;
    border-color: #d0d0d0;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
}

.store-item input {
    flex: 1;
    border: 1px solid #d0d0d0;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 15px;
    background: #ffffff;
    transition: all 0.2s ease;
    font-weight: 500;
}

.store-item input:focus {
    outline: none;
    border-color: #007aff;
    box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
}

.store-item button {
    background: #ffffff;
    color: #ff3b30;
    border: 1px solid #e8e8e8;
    padding: 8px 16px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s ease;
}

.store-item button:hover {
    background: #ff3b30;
    color: #ffffff;
    border-color: #ff3b30;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(255, 59, 48, 0.3);
}

.store-item button:active {
    transform: translateY(0);
}

.store-item .move-btn {
    background: #ffffff;
    color: #007aff;
    border: 1px solid #e8e8e8;
    padding: 8px 12px;
    font-size: 16px;
    min-width: 40px;
    font-weight: 600;
}

.store-item .move-btn:hover {
    background: #007aff;
    color: #ffffff;
    border-color: #007aff;
    box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
}

.add-store-btn {
    background: linear-gradient(135deg, #007aff 0%, #0051d5 100%);
    color: #ffffff;
    border: none;
    padding: 14px 20px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
    width: 100%;
    transition: all 0.2s ease;
    box-shadow: 0 4px 14px rgba(0, 122, 255, 0.3);

    box-shadow: 0 8px 24px rgba(59, 130, 246, 0.25);
    cursor: grabbing;
    z-index: 1000;
}

.store-list-card.drag-over {
    background: #dcfce7 !important;
    border: 2px solid #22c55e !important;
    transform: scale(1.01);
    box-shadow: 0 4px 12px rgba(34, 197, 94, 0.2);
}

.stores-list-vertical.drag-active {
    background: #f0f9ff;
    border: 2px dashed #3b82f6;
    border-radius: 10px;
    padding: 16px;
}

/* BOTÕES DO MODAL DE LOJAS */
.stores-modal-footer {
    position: sticky;
    bottom: 0;
    background: #ffffff;
    border-top: 1px solid #e5e7eb;
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    box-shadow: 0 -3px 10px rgba(0, 0, 0, 0.05);
    flex-shrink: 0;
}

.stores-modal-btn-group {
    display: flex;
    gap: 8px;
}

.stores-modal-add-btn {
    width: 100%;
    padding: 12px 16px;
    border-radius: 0;
    background: #1a1a1a;
    color: white;
    border: none;
    border-top: 1px solid #e5e7eb;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
}

.stores-modal-add-btn:hover {
    background: #2d2d2d;
}

/* ESTADO VAZIO NO MODAL DE LOJAS */
.stores-empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #9ca3af;
}

.stores-empty-state-icon {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.5;
}

.stores-empty-state-text {
    font-size: 14px;
    font-weight: 500;
    color: #6b7280;
}

/* RESPONSIVIDADE */
@media (max-width: 768px) {
    .modal-container,
    .stores-modal-container {
        width: 95%;
        height: 90vh;
        border-radius: 10px;
    }
    
    .stores-drag-container {
        grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
        gap: 8px;
    }
    
    .store-editor-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
    }
    
    .editor-actions-bar {
        flex-direction: column;
    }
    
    .editor-actions-left,
    .editor-actions-right {
        width: 100%;
    }
    
    .game-btn {
        flex: 1;
        justify-content: center;
    }
}
    </style>
</head>

// Função para mostrar mensagem de status

// Função para salvar dados no localStorage
function saveData() {

    inputs.forEach((input, index) => {
        data[`input_${index}`] = input.value;
    });

    // Só salva se os dados mudaram
    if (dataString !== lastSavedData) {

// Função para carregar dados do localStorage

// Função para limpar todos os campos
function clearData() {

// Função para ajustar automaticamente o tamanho da fonte
function autoAdjustFontSize(textarea) {
    // Resetar para tamanho padrão
    textarea.style.fontSize = '9pt';
    textarea.style.lineHeight = '1.1';
    
    // Verificar se o conteúdo excede a altura
    const maxHeight = textarea.clientHeight;
    let fontSize = 9;
    
    // Reduzir fonte gradualmente até caber
    while (textarea.scrollHeight > maxHeight && fontSize > 6) {
        fontSize -= 0.5;
        textarea.style.fontSize = fontSize + 'pt';
        textarea.style.lineHeight = '1.0';
    }
    
    // Se ainda não couber, reduzir line-height
    if (textarea.scrollHeight > maxHeight) {
        textarea.style.lineHeight = '0.9';
    }
}


// Função para centralizar cursor verticalmente no textarea
function centerTextareaContent() {
    document.querySelectorAll('.motorista-placa-textarea').forEach(textarea => {
        // Resetar estilos de posicionamento forçado
        textarea.style.position = '';
        textarea.style.top = '';
        textarea.style.transform = '';
        textarea.style.paddingTop = '';
        textarea.style.paddingBottom = '';
        
        // Aplicar centralização natural
        const parent = textarea.closest('td');
        if (parent) {
            parent.style.verticalAlign = 'middle';
            parent.style.textAlign = 'center';
        }
        
        // Calcular padding para centralização vertical baseado no conteúdo
        const textareaHeight = textarea.clientHeight;
        const lines = textarea.value.split('\n').length;
        const lineHeight = parseFloat(window.getComputedStyle(textarea).lineHeight) || 14;
        const contentHeight = lines * lineHeight;
        
        // Se o conteúdo for menor que a altura, centralizar verticalmente
        if (contentHeight < textareaHeight) {
            const paddingTop = Math.max(0, (textareaHeight - contentHeight) / 2);
            textarea.style.paddingTop = paddingTop + 'px';
            textarea.style.paddingBottom = '2px';
        } else {
            // Se não couber, usar padding mínimo
            textarea.style.padding = '2px';
        }
        
        // Garantir display correto
        textarea.style.display = 'block';
        textarea.style.width = '100%';
        textarea.style.height = '100%';
    });
}

// Função melhorada para contar placas de caminhões
function contarCaminhoes() {
    const textareas = document.querySelectorAll('.motorista-placa-textarea');
    const placasEncontradas = new Set();
    
    // Regex para placas brasileiras:
    // Padrão COMPLETO ANTIGO: 3 letras + 4 números (ex: ABC1234, abc-1234)
    const regexPlacaAntiga = /\b[A-Za-z]{3}[-\s]?[0-9]{4}\b/g;
    
    // Padrão COMPLETO MERCOSUL: 3 letras + 1 número + 1 letra + 2 números (ex: ABC1D23)
    const regexPlacaMercosul = /\b[A-Za-z]{3}[-\s]?[0-9][A-Za-z][0-9]{2}\b/g;
    
    // Padrão REDUZIDO: últimos 4 dígitos (ex: 1234, 1D23)
    // Formato ANTIGO reduzido: 4 números (ex: 1234)
    const regexReduzidoAntigo = /\b[0-9]{4}\b/g;
    
    // Formato MERCOSUL reduzido: 1 número + 1 letra + 2 números (ex: 1D23, 2h76)
    const regexReduzidoMercosul = /\b[0-9][A-Za-z][0-9]{2}\b/g;
    
    textareas.forEach(textarea => {
        const texto = textarea.value.trim();
        
        if (texto !== '') {
            // Buscar placas completas no padrão antigo
            let matchesAntiga = texto.match(regexPlacaAntiga);
            if (matchesAntiga) {
                matchesAntiga.forEach(placa => {
                    const placaNormalizada = placa.replace(/[-\s]/g, '').toUpperCase();
                    placasEncontradas.add(placaNormalizada);
                });
            }
            
            // Buscar placas completas no padrão Mercosul
            let matchesMercosul = texto.match(regexPlacaMercosul);
            if (matchesMercosul) {
                matchesMercosul.forEach(placa => {
                    const placaNormalizada = placa.replace(/[-\s]/g, '').toUpperCase();
                    placasEncontradas.add(placaNormalizada);
                });
            }
            
            // Buscar placas reduzidas (4 números) - apenas se NÃO encontrou placa completa
            if (!matchesAntiga && !matchesMercosul) {
                let matchesReduzidoAntigo = texto.match(regexReduzidoAntigo);
                if (matchesReduzidoAntigo) {
                    matchesReduzidoAntigo.forEach(placa => {
                        const placaNormalizada = placa.toUpperCase();
                        placasEncontradas.add(placaNormalizada);
                    });
                }
                
                // Buscar placas reduzidas Mercosul (1 número + 1 letra + 2 números)
                let matchesReduzidoMercosul = texto.match(regexReduzidoMercosul);
                if (matchesReduzidoMercosul) {
                    matchesReduzidoMercosul.forEach(placa => {
                        const placaNormalizada = placa.toUpperCase();
                        placasEncontradas.add(placaNormalizada);
                    });
                }
            }
        }
    });
    
    const totalCaminhoes = placasEncontradas.size;
    const elementoTotal = document.getElementById('totalCaminhoes');
    
    if (elementoTotal) {
        if (totalCaminhoes === 0) {
            elementoTotal.textContent = 'Nenhum caminhão carregado';
        } else if (totalCaminhoes === 1) {
            elementoTotal.textContent = 'Total de 1 caminhão carregado';
        } else {
            elementoTotal.textContent = `Total de ${totalCaminhoes} caminhões carregados`;
        }
    }
}

// Função para aplicar máscara de data
function applyDateMask(input) {
    let value = input.value.replace(/\D/g, '');
    
    if (value.length === 0) {
        input.value = '__/__/____';
        return;
    }
    
    let formatted = '';
    
    if (value.length <= 2) {
        formatted = value;
    } else if (value.length <= 4) {
        formatted = value.slice(0, 2) + '/' + value.slice(2);
    } else {
        formatted = value.slice(0, 2) + '/' + value.slice(2, 4) + '/' + value.slice(4, 8);
    }
    
    input.value = formatted;
}

// Função para navegar para o campo de baixo
function navigateToFieldBelow(currentField) {
    const currentCell = currentField.closest('td');
    if (!currentCell) return;
    
    const currentRow = currentCell.closest('tr');
    if (!currentRow) return;
    
    const editableCellsInRow = Array.from(currentRow.querySelectorAll('td')).filter(td => {
        return td.querySelector('input:not([readonly]), textarea.motorista-placa-textarea');
    });
    
    const currentCellIndex = editableCellsInRow.indexOf(currentCell);
    if (currentCellIndex === -1) return;
    
    let nextRow = currentRow.nextElementSibling;
    
    while (nextRow) {
        if (nextRow.classList.contains('blank-row')) {
            nextRow = nextRow.nextElementSibling;
            continue;
        }
        
        const nextRowEditableCells = Array.from(nextRow.querySelectorAll('td')).filter(td => {
            return td.querySelector('input:not([readonly]), textarea.motorista-placa-textarea');
        });
        
        if (nextRowEditableCells.length > currentCellIndex) {
            const nextCell = nextRowEditableCells[currentCellIndex];
            const nextField = nextCell.querySelector('input:not([readonly]), textarea.motorista-placa-textarea');
            
            if (nextField) {
                nextField.focus();
                if (nextField.tagName === 'INPUT') {
                    nextField.select();
                }
                return;
            }
        }
        nextRow = nextRow.nextElementSibling;
    }
    
    const allFields = Array.from(document.querySelectorAll('input:not([readonly]), textarea.motorista-placa-textarea'));
    const currentIndex = allFields.indexOf(currentField);
    
    if (currentIndex !== -1 && currentIndex < allFields.length - 1) {
        const nextField = allFields[currentIndex + 1];
        nextField.focus();
        if (nextField.tagName === 'INPUT') {
            nextField.select();
        }
    }
}

// Função fallback para download
function fallbackDownload(canvas) {
    canvas.toBlob(function(blob) {
        const link = document.createElement('a');
        const date = new Date();
        const timestamp = date.toISOString().slice(0, 19).replace(/[:.]/g, '-');
        
        link.download = `controle-carregamento-${timestamp}.png`;
        link.href = URL.createObjectURL(blob);
        link.click();
        
        setTimeout(() => {
            URL.revokeObjectURL(link.href);
            showStatus('📥 Download da imagem iniciado!');
        }, 100);
    }, 'image/png');
}

            }
        });
        
        dateInput.addEventListener('input', function() {

        });
        
        dateInput.addEventListener('paste', function(e) {
            e.preventDefault();
            const pastedText = (e.clipboardData || window.clipboardData).getData('text');
            const numbers = pastedText.replace(/\D/g, '');
            this.value = '';
            
            for (let i = 0; i < numbers.length && i < 8; i++) {
                this.value += numbers[i];

        });

// Gerar tabela completa
function generateCompleteTable() {
    const config = loadRoutesConfig();
    const tbody = document.getElementById('dynamicTableBody');
    
    let html = '<tr class="blank-row"><td colspan="10"></td></tr>';
    
    // Ordem das regiões
    const regionOrder = [
        'ABC',
        'Cinturão',
        'Zona Leste',
        'Miolo',
        'Guarulhos',
        'Vale do Paraíba',
        'Atibaia',
        'Praia Grande',
        'Rio de Janeiro'
    ];
    
    regionOrder.forEach(region => {
        if (!config[region]) return;
        
        // Vale do Paraíba é especial
        if (region === 'Vale do Paraíba') {
            html += generateValeParaibaRegion(config[region]);
        } else {
            // Regiões normais
            html += generateSimpleRegion(region, config[region]);
        }
        
        // Linha em branco entre regiões (exceto última)
        if (region !== 'Rio de Janeiro') {
            html += '<tr class="blank-row"><td colspan="10"></td></tr>';
        }
    });
    
    tbody.innerHTML = html;
    
    // Reconfigurar event listeners após gerar tabela
    setupTableEventListeners();
    
    // Ajustar textareas
    document.querySelectorAll('.motorista-placa-textarea').forEach(textarea => {
        autoAdjustFontSize(textarea);
    });
    
    // Carregar dados salvos
    loadData();
    
    // Calcular totais
    calculateAllTotals();
    
    // Contar caminhões
    contarCaminhoes();
}

// Configurar event listeners da tabela
function setupTableEventListeners() {
    // Event listener para campos numéricos
    document.querySelectorAll('.qtde-paletes, .box, .container, .camara').forEach(input => {
        input.addEventListener('input', function() {
            setTimeout(calculateAllTotals, 10);
            clearTimeout(autoSaveTimeout);
            autoSaveTimeout = setTimeout(saveData, 1000);
        });
    });
    
    // Event listener para textareas de motorista/placa
    document.querySelectorAll('.motorista-placa-textarea').forEach(textarea => {
        textarea.addEventListener('input', function() {
            autoAdjustFontSize(this);
            centerTextareaContent();
            contarCaminhoes();
            clearTimeout(autoSaveTimeout);
            autoSaveTimeout = setTimeout(saveData, 1000);
        });
    });
    
    // Event listener para temperatura
    document.querySelectorAll('.temperatura').forEach(input => {
        input.addEventListener('input', function() {
            clearTimeout(autoSaveTimeout);
            autoSaveTimeout = setTimeout(saveData, 1000);
        });
    });
}

// Carregar configuração salva ou usar padrão
function loadRoutesConfig() {
    const saved = localStorage.getItem('routesConfig');
    return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(defaultRoutes));
}

// Salvar configuração
function saveRoutesConfig(config) {
    localStorage.setItem('routesConfig', JSON.stringify(config));
}

});

function initializeRouteDragAndDrop() {
    const draggables = document.querySelectorAll('.route-card[draggable="true"]');
    const container = document.getElementById('routeCardsContainer');
    
    let draggedElement = null;
    
    draggables.forEach(draggable => {
        // Início do arrasto
        draggable.addEventListener('dragstart', (e) => {
            draggedElement = draggable;
            draggable.classList.add('dragging');
            container.classList.add('drag-active');
            e.dataTransfer.effectAllowed = 'move';
        });
        
        // Fim do arrasto
        draggable.addEventListener('dragend', () => {
            draggable.classList.remove('dragging');
            container.classList.remove('drag-active');
            
            // Limpar todas as classes drag-over
            document.querySelectorAll('.route-card').forEach(card => {
                card.classList.remove('drag-over');
            });
            
            draggedElement = null;
            
            // Salvar nova ordem
            saveRouteOrder();
        });
        
        // Arrastar sobre outro card
        draggable.addEventListener('dragover', (e) => {
            e.preventDefault();
            
            // Não destacar o próprio card sendo arrastado
            if (draggable === draggedElement) {
                return;
            }
            
            // Limpar drag-over de outros cards
            document.querySelectorAll('.route-card').forEach(card => {
                if (card !== draggable && card !== draggedElement) {
                    card.classList.remove('drag-over');
                }
            });
            
            // Adicionar drag-over ao card atual
            draggable.classList.add('drag-over');
        });
        
        // Sair do card
        draggable.addEventListener('dragleave', (e) => {
            // Só remover se realmente saiu
            if (!draggable.contains(e.relatedTarget)) {
                draggable.classList.remove('drag-over');
            }
        });
        
        // Soltar sobre card
        draggable.addEventListener('drop', (e) => {
            e.preventDefault();
            e.stopPropagation();
            
            if (!draggedElement || draggedElement === draggable) {
                return;
            }
            
            // Trocar posições
            const allCards = [...container.querySelectorAll('.route-card')];
            const draggedIndex = allCards.indexOf(draggedElement);
            const targetIndex = allCards.indexOf(draggable);
            
            if (draggedIndex < targetIndex) {
                draggable.parentNode.insertBefore(draggedElement, draggable.nextSibling);
            } else {
                draggable.parentNode.insertBefore(draggedElement, draggable);
            }
            
            // Remover destaque
            draggable.classList.remove('drag-over');
        });
    });
}

// Salvar nova ordem das rotas
function saveRouteOrder() {
    const cards = document.querySelectorAll('.route-card');
    const config = loadRoutesConfig();
    const newConfig = {};
    
    // Reconstruir config na nova ordem
    cards.forEach(card => {
        const routeName = card.dataset.routeName;
        if (routeName && config[routeName]) {
            newConfig[routeName] = config[routeName];
        }
    });
    
    saveRoutesConfig(newConfig);
    
    // Limpar dados da tabela
    localStorage.removeItem('controleCarregamento');
    lastSavedData = '';
    
    // Regenerar tabela
    generateCompleteTable();
    
    showStatus('✅ Ordem das rotas atualizada!');
}

function createNewRoute() {
    const routeName = prompt('📝 Digite o nome da nova rota:');
    
    if (!routeName || routeName.trim() === '') {
        return;
    }
    
    const config = loadRoutesConfig();
    
    if (config[routeName.trim()]) {
        alert('⚠️ Já existe uma rota com este nome!');
        return;
    }
    
    config[routeName.trim()] = [];
    saveRoutesConfig(config);
    
    // REGENERAR a tabela principal
    generateCompleteTable();
    
    // Atualizar cards no modal
    renderRouteCards();
    
    showStatus('✅ Nova rota criada com sucesso!');
}

function renameRoute(oldName) {
    const newName = prompt('✏️ Digite o novo nome da rota:', oldName);
    
    if (!newName || newName.trim() === '' || newName.trim() === oldName) {
        return;
    }
    
    const config = loadRoutesConfig();
    
    if (config[newName.trim()]) {
        alert('⚠️ Já existe uma rota com este nome!');
        return;
    }
    
    // Copiar dados da rota antiga para a nova
    config[newName.trim()] = JSON.parse(JSON.stringify(config[oldName]));
    delete config[oldName];
    
    saveRoutesConfig(config);
    
    // LIMPAR dados salvos da tabela
    localStorage.removeItem('controleCarregamento');
    lastSavedData = '';
    
    // REGENERAR a tabela principal
    generateCompleteTable();
    
    // Atualizar cards no modal
    renderRouteCards();
    
    showStatus('✅ Rota renomeada! Tabela atualizada.', 2000);
}

// Excluir rota
function deleteRoute(routeName) {
    if (!confirm(`🗑️ Tem certeza que deseja excluir a rota "${routeName}"?`)) {
        return;
    }
    
    const config = loadRoutesConfig();
    delete config[routeName];
    
    saveRoutesConfig(config);
    renderRouteCards();
    showStatus('✅ Rota excluída com sucesso!');
}

let currentEditingRoute = null;

// Abrir modal de lojas
function openStoresModal(routeName) {
    currentEditingRoute = routeName;
    const modal = document.getElementById('storesModal');
    const title = document.getElementById('storesModalTitle');
    
    title.textContent = `🏪 Lojas - ${routeName}`;
    modal.style.display = 'block';
    
    renderStoresList(routeName);
}

// Fechar modal de lojas
function closeStoresModal() {
    document.getElementById('storesModal').style.display = 'none';
    currentEditingRoute = null;
}

// Renderizar lista de lojas
function renderStoresList(routeName) {
    const container = document.getElementById('storesModalBody');
    const config = loadRoutesConfig();
    const stores = config[routeName];
    
    let html = '<div class="stores-list-vertical" id="storesListContainer">';
    
    // Se for rota com sub-regiões (Vale do Paraíba)
    if (!Array.isArray(stores)) {
        Object.keys(stores).forEach(subRegion => {
            html += `<div style="padding: 0 16px; margin: 12px 0 8px 0;">
                        <div style="font-size: 11px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px;">
                            ${subRegion}
                        </div>
                     </div>`;
            
            stores[subRegion].forEach((store, index) => {
                html += generateStoreListCard(store, index, subRegion);
            });
        });
    } else {
        // Rota simples
        if (stores.length === 0) {
            html += `
                <div class="stores-empty-state">
                    <div class="stores-empty-state-icon">📦</div>
                    <div class="stores-empty-state-text">Nenhuma loja cadastrada</div>
                </div>
            `;
        } else {
            stores.forEach((store, index) => {
                html += generateStoreListCard(store, index);
            });
        }
    }
    
    html += '</div>';
    container.innerHTML = html;
    
    // Inicializar drag & drop
    initializeStoresDragAndDrop();
}

// Gerar HTML do card de loja
function generateStoreListCard(store, index, subRegion) {
    const dataSubregion = subRegion ? `data-subregion="${subRegion}"` : '';
    
    return `
        <div class="store-list-card" draggable="true" data-index="${index}" data-store="${store}" ${dataSubregion}>
            <div class="store-list-card-drag-handle">⋮⋮</div>
            <div class="store-list-card-number">${store}</div>
            <div class="store-list-card-label">Loja ${store}</div>
            <div class="store-list-card-actions">
                <button class="icon-btn btn-delete" onclick="removeStoreFromList(${index}, '${subRegion || ''}')">🗑️</button>
            </div>
        </div>
    `;
}

// Inicializar Drag & Drop para lojas
function initializeStoresDragAndDrop() {
    const draggables = document.querySelectorAll('.store-list-card[draggable="true"]');
    const container = document.getElementById('storesListContainer');
    
    let draggedElement = null;
    
    draggables.forEach(draggable => {
        draggable.addEventListener('dragstart', (e) => {
            draggedElement = draggable;
            draggable.classList.add('dragging');
            container.classList.add('drag-active');
            e.dataTransfer.effectAllowed = 'move';
        });
        
        draggable.addEventListener('dragend', () => {
            draggable.classList.remove('dragging');
            container.classList.remove('drag-active');
            
            document.querySelectorAll('.store-list-card').forEach(card => {
                card.classList.remove('drag-over');
            });
            
            draggedElement = null;
        });
        
        draggable.addEventListener('dragover', (e) => {
            e.preventDefault();
            
            if (draggable === draggedElement) {
                return;
            }
            
            document.querySelectorAll('.store-list-card').forEach(card => {
                if (card !== draggable && card !== draggedElement) {
                    card.classList.remove('drag-over');
                }
            });
            
            draggable.classList.add('drag-over');
        });
        
        draggable.addEventListener('dragleave', (e) => {
            if (!draggable.contains(e.relatedTarget)) {
                draggable.classList.remove('drag-over');
            }
        });
        
        draggable.addEventListener('drop', (e) => {
            e.preventDefault();
            e.stopPropagation();
            
            if (!draggedElement || draggedElement === draggable) {
                return;
            }
            
            const allCards = [...container.querySelectorAll('.store-list-card')];
            const draggedIndex = allCards.indexOf(draggedElement);
            const targetIndex = allCards.indexOf(draggable);
            
            if (draggedIndex < targetIndex) {
                draggable.parentNode.insertBefore(draggedElement, draggable.nextSibling);
            } else {
                draggable.parentNode.insertBefore(draggedElement, draggable);
            }
            
            draggable.classList.remove('drag-over');
        });
    });
}

// Remover loja da lista
function removeStoreFromList(index, subRegion) {
    if (!confirm('🗑️ Remover esta loja?')) {
        return;
    }
    
    const config = loadRoutesConfig();
    const routeName = currentEditingRoute;
    
    if (subRegion) {
        config[routeName][subRegion].splice(index, 1);
    } else {
        config[routeName].splice(index, 1);
    }
    
    saveRoutesConfig(config);
    renderStoresList(routeName);
    showStatus('✅ Loja removida!');
}

// Adicionar loja pelo modal
function addStoreFromModalHandler() {
    const config = loadRoutesConfig();
    const routeName = currentEditingRoute;
    
    // Verificar se é rota com sub-regiões
    if (!Array.isArray(config[routeName])) {
        // Perguntar em qual sub-região adicionar
        const subRegions = Object.keys(config[routeName]);
        
        // Criar mensagem mais clara
        let message = 'Digite o NÚMERO da região onde deseja adicionar:\n\n';
        subRegions.forEach((subRegion, index) => {
            message += `${index + 1} - ${subRegion}\n`;
        });
        
        const answer = prompt(message);
        
        if (!answer || answer.trim() === '') {
            return; // Usuário cancelou
        }
        
        // Converter resposta para número e validar
        const selectedIndex = parseInt(answer.trim()) - 1;
        
        if (isNaN(selectedIndex) || selectedIndex < 0 || selectedIndex >= subRegions.length) {
            alert('❌ Opção inválida! Digite apenas o número da região.');
            return;
        }
        
        const selectedSubRegion = subRegions[selectedIndex];
        
        // Agora perguntar o número da loja
        const storeNumber = prompt(`📝 Digite o número da nova loja para "${selectedSubRegion}":`);
        
        if (!storeNumber || storeNumber.trim() === '') {
            return;
        }
        
        // Adicionar loja na sub-região selecionada
        config[routeName][selectedSubRegion].push(storeNumber.trim());
        
        saveRoutesConfig(config);
        renderStoresList(routeName);
        showStatus(`✅ Loja ${storeNumber.trim()} adicionada em ${selectedSubRegion}!`);
    } else {
        // Rota simples (sem sub-regiões)
        const storeNumber = prompt('📝 Digite o número da nova loja:');
        
        if (!storeNumber || storeNumber.trim() === '') {
            return;
        }
        
        config[routeName].push(storeNumber.trim());
        
        saveRoutesConfig(config);
        renderStoresList(routeName);
        showStatus('✅ Loja adicionada!');
    }
}

// Salvar alterações das lojas
function saveStoresFromModalHandler() {
    const cards = document.querySelectorAll('.store-list-card');
    const config = loadRoutesConfig();
    const routeName = currentEditingRoute;
    
    // Se for rota simples
    if (Array.isArray(config[routeName])) {
        const newOrder = Array.from(cards).map(card => card.dataset.store);
        config[routeName] = newOrder;
    } else {
        // Rota com sub-regiões
        const subRegions = Object.keys(config[routeName]);
        
        subRegions.forEach(subRegion => {
            const subCards = Array.from(cards).filter(card => card.dataset.subregion === subRegion);
            config[routeName][subRegion] = subCards.map(card => card.dataset.store);
        });
    }
    
    saveRoutesConfig(config);
    
    // Limpar dados da tabela
    localStorage.removeItem('controleCarregamento');
    lastSavedData = '';
    
    // Regenerar tabela
    generateCompleteTable();
    
    showStatus('✅ Alterações salvas! Tabela atualizada.', 2000);
    closeStoresModal();
}

function backToRoutesFromStoresHandler() {

// ========================================
//  EVENT LISTENERS DO NOVO SISTEMA
// ========================================

// Adicionar event listeners para os novos modais
document.addEventListener('DOMContentLoaded', function() {
    // Botão de gerenciar
    const manageBtn = document.getElementById('manageBtn');
    if (manageBtn) {
        manageBtn.addEventListener('click', openManageModal);
    }
    
    // Fechar modal principal
    const closeModalBtn = document.getElementById('closeModal');
    if (closeModalBtn) {
        closeModalBtn.addEventListener('click', closeManageModal);
    }
    
    // Fechar modal ao clicar fora
    const modal = document.getElementById('manageModal');
    if (modal) {
        modal.addEventListener('click', function(e) {
            if (e.target === this) {
                closeManageModal();
            }
        });
    }
    
    // Sistema de abas
    document.querySelectorAll('.admin-tab').forEach(tab => {
        tab.addEventListener('click', function() {
            const targetTab = this.dataset.tab;
            
            // Remover active de todas as abas
            document.querySelectorAll('.admin-tab').forEach(t => {
                t.classList.remove('active');
            });
            
            // Remover active de todos os conteúdos
            document.querySelectorAll('.tab-content').forEach(c => {
                c.classList.remove('active');
            });
            
            // Ativar aba selecionada
            this.classList.add('active');
            
            // Ativar conteúdo correspondente
            const targetContent = document.getElementById(`tab-${targetTab}`);
            if (targetContent) {
                targetContent.classList.add('active');
            }
        });
    });
});

// Event listeners do modal de lojas
const closeStoresModalBtn = document.getElementById('closeStoresModal');
if (closeStoresModalBtn) {

}

const backToRoutesBtn = document.getElementById('backToRoutesFromStores');
