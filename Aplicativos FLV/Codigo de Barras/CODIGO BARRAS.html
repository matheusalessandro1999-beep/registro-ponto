<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Código 128</title>
  <script>
    // Carregamento da biblioteca JsBarcode
    function loadJsBarcode() {
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js';
        script.onload = resolve;
        script.onerror = () => reject(new Error('Falha ao carregar JsBarcode'));
        document.head.appendChild(script);
      });
    }
    loadJsBarcode().catch(err => {
      console.error(err);
      alert('Erro ao carregar a biblioteca de códigos de barras.');
    });
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #334155;
    }
    
    .container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 500px;
      border: 1px solid #e2e8f0;
    }
    
    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    
    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 8px;
      letter-spacing: -0.025em;
    }
    
    .subtitle {
      font-size: 14px;
      color: #64748b;
      font-weight: 400;
    }
    
    .input-section {
      margin-bottom: 32px;
    }
    
    .input-group {
      display: flex;
      gap: 12px;
      align-items: stretch;
    }
    
    input {
      flex: 1;
      padding: 12px 16px;
      font-size: 16px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      background: #ffffff;
      color: #1e293b;
      transition: all 0.2s ease;
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    
    input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    
    input::placeholder {
      color: #94a3b8;
      text-transform: none;
      letter-spacing: normal;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    .generate-btn {
      background: #3b82f6;
      border: none;
      border-radius: 8px;
      color: white;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    
    .generate-btn:hover {
      background: #2563eb;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
    }
    
    .generate-btn:active {
      transform: translateY(0);
    }
    
    .generate-btn:disabled {
      background: #94a3b8;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    
    .barcode-container {
      background: #f8fafc;
      border: 2px dashed #cbd5e1;
      border-radius: 12px;
      padding: 32px 16px;
      text-align: center;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      transition: all 0.3s ease;
    }
    
    .barcode-container.has-content {
      background: white;
      border: 1px solid #e2e8f0;
      border-style: solid;
    }
    
    #barcode {
      max-width: 100%;
      height: auto;
    }
    
    .placeholder {
      color: #64748b;
      font-size: 16px;
      line-height: 1.5;
    }
    
    .placeholder small {
      display: block;
      font-size: 14px;
      color: #94a3b8;
      margin-top: 4px;
    }
    
    .error {
      color: #dc2626;
      font-weight: 500;
    }
    
    .loading {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #3b82f6;
      font-weight: 500;
    }
    
    .loading::before {
      content: '';
      width: 16px;
      height: 16px;
      border: 2px solid #e2e8f0;
      border-top: 2px solid #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .fade-in {
      animation: fadeIn 0.3s ease-in;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .shake {
      animation: shake 0.5s ease-in-out;
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }
    
    @media (max-width: 768px) {
      .container {
        padding: 24px;
        margin: 10px;
      }
      
      h1 {
        font-size: 24px;
      }
      
      .input-group {
        flex-direction: column;
      }
      
      .generate-btn {
        padding: 14px 20px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Gerador Código de Barras</h1>
      <div class="subtitle">FLV - PERECÍVEIS</div>
    </div>
    
    <div class="input-section">
      <div class="input-group">
        <input 
          type="text" 
          id="codeInput" 
          placeholder="Digite seu código aqui"
          maxlength="25"
          aria-label="Código para gerar código de barras"
        >
        <button 
          class="generate-btn" 
          id="generateBtn" 
          onclick="generateBarcode()"
          aria-label="Gerar código de barras"
        >
          Gerar
        </button>
      </div>
    </div>
    
    <div class="barcode-container" id="barcodeContainer">
      <div class="placeholder" id="placeholder">
      </div>
      <svg id="barcode"></svg>
    </div>
  </div>

  <script>
    const codeInput = document.getElementById('codeInput');
    const generateBtn = document.getElementById('generateBtn');
    const barcodeContainer = document.getElementById('barcodeContainer');
    const placeholder = document.getElementById('placeholder');
    const barcodeElement = document.getElementById('barcode');
    
    async function generateBarcode() {
      const input = codeInput.value.trim();
      
      // Validação
      if (!input) {
        showError('Digite um código primeiro');
        codeInput.classList.add('shake');
        setTimeout(() => codeInput.classList.remove('shake'), 500);
        codeInput.focus();
        return;
      }
      
      if (!/^[A-Za-z0-9\-_.]+$/.test(input)) {
        showError('Use apenas letras, números e os caracteres: - _ .');
        codeInput.focus();
        return;
      }
      
      // Estado de carregamento
      showLoading();
      generateBtn.disabled = true;
      
      try {
        // Simula um pequeno delay para UX
        await new Promise(resolve => setTimeout(resolve, 300));
        
        // Limpa SVG anterior
        barcodeElement.innerHTML = '';
        
        // Gera o código de barras
        JsBarcode(barcodeElement, input, {
          format: "CODE128",
          displayValue: false,
          width: 2,
          height: 60,
          background: "transparent",
          lineColor: "#1e293b",
          fontSize: 14,
          fontOptions: "bold",
          font: "monospace",
          textMargin: 8
        });
        
        // Mostra o resultado
        showResult();
        
      } catch (error) {
        console.error('Erro ao gerar código de barras:', error);
        showError('Erro ao processar o código');
      } finally {
        generateBtn.disabled = false;
      }
    }
    
    function showLoading() {
      placeholder.className = 'loading';
      placeholder.innerHTML = 'Gerando código...';
      placeholder.style.display = 'flex';
      barcodeContainer.classList.remove('has-content');
    }
    
    function showResult() {
      placeholder.style.display = 'none';
      barcodeContainer.classList.add('has-content', 'fade-in');
      setTimeout(() => barcodeContainer.classList.remove('fade-in'), 300);
    }
    
    function showError(message) {
      placeholder.className = 'placeholder error';
      placeholder.innerHTML = message;
      placeholder.style.display = 'block';
      barcodeContainer.classList.remove('has-content');
      
      // Volta ao normal após 3 segundos
      setTimeout(() => {
        if (placeholder.classList.contains('error')) {
          resetPlaceholder();
        }
      }, 3000);
    }
    
    function resetPlaceholder() {
      placeholder.className = 'placeholder';
      placeholder.innerHTML = 'Insira um código para começar<small>Aceita letras e números</small>';
    }
    
    // Eventos
    codeInput.addEventListener('keypress', function(event) {
      if (event.key === 'Enter') {
        generateBarcode();
      }
    });
    
    codeInput.addEventListener('input', function() {
      if (placeholder.classList.contains('error')) {
        resetPlaceholder();
      }
    });
    
    // Foco automático quando a página carrega
    window.addEventListener('load', function() {
      codeInput.focus();
    });
  </script>
</body>
</html>
