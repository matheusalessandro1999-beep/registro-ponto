<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Identificação de Produtos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cleave.js/1.6.0/cleave.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VCR+OSD+Mono&display=swap');
    
    * {
      font-family: 'VCR OSD Mono', monospace;
      box-sizing: border-box;
    }
    
    body {
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      color: #000000;
      min-height: 100vh;
      padding: 1rem;
      position: relative;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 2px 2px, rgba(0,0,0,0.02) 1px, transparent 0);
      background-size: 20px 20px;
      pointer-events: none;
      z-index: 0;
    }
    
    .container {
      max-width: 960px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    
    .card {
      background: #FFFFFF;
      border: 3px solid #000000;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 8px 8px 0px #000000;
      position: relative;
      transition: all 0.3s ease;
    }
    
    .card:hover {
      box-shadow: 12px 12px 0px #000000;
      transform: translate(-2px, -2px);
    }
    
    .header-card {
      border: 3px solid #333333;
      background: linear-gradient(145deg, #ffffff 0%, #f8f9fa 100%);
      box-shadow: 8px 8px 0px #333333;
    }
    
    .header-card:hover {
      box-shadow: 12px 12px 0px #333333;
    }
    
    .button {
      background: linear-gradient(145deg, #e9ecef 0%, #d6d8db 100%);
      color: #000000;
      padding: 0.75rem 1.5rem;
      border: 3px solid #000000;
      transition: all 0.2s ease;
      cursor: pointer;
      font-size: 1rem;
      text-transform: uppercase;
      font-weight: bold;
      letter-spacing: 0.5px;
      box-shadow: 4px 4px 0px #000000;
      position: relative;
      overflow: hidden;
    }
    
    .button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      transition: left 0.5s ease;
    }
    
    .button:hover::before {
      left: 100%;
    }
    
    .button:hover {
      background: linear-gradient(145deg, #000000 0%, #333333 100%);
      color: #FFFFFF;
      box-shadow: 6px 6px 0px #666666;
      transform: translate(-1px, -1px);
    }
    
    .button:active {
      background: #333333;
      color: #FFFFFF;
      box-shadow: 2px 2px 0px #666666;
      transform: translate(2px, 2px);
    }
    
    .input {
      background: #FFFFFF;
      color: #000000;
      border: 3px solid #808080;
      padding: 0.75rem;
      width: 100%;
      font-size: 1rem;
      transition: all 0.3s ease;
      box-shadow: inset 2px 2px 4px rgba(0,0,0,0.1);
    }
    
    .input:focus {
      outline: none;
      border-color: #000000;
      box-shadow: inset 2px 2px 4px rgba(0,0,0,0.2), 0 0 0 3px rgba(0,0,0,0.1);
      transform: scale(1.01);
    }
    
    .input-readonly {
      background: linear-gradient(145deg, #e9ecef 0%, #d6d8db 100%) !important;
      border-color: #333333 !important;
      box-shadow: inset 2px 2px 4px rgba(0,0,0,0.15) !important;
    }
    
    .section-icon {
      background: linear-gradient(145deg, #e9ecef 0%, #d6d8db 100%);
      width: 2.5rem;
      height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 3px solid #000000;
      box-shadow: 3px 3px 0px #000000;
      transition: all 0.3s ease;
    }
    
    .section-icon:hover {
      transform: rotate(5deg) scale(1.05);
      box-shadow: 4px 4px 0px #000000;
    }
    
    label {
      position: relative;
      display: inline-block;
    }
    
    label::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 2px;
      background: #000000;
      transition: width 0.3s ease;
    }
    
    label:hover::after {
      width: 100%;
    }
    
    .pulse-printing {
      animation: pulse-print 1.5s ease-in-out infinite;
    }
    
    @keyframes pulse-print {
      0%, 100% { 
        transform: scale(1);
        box-shadow: 4px 4px 0px #000000;
      }
      50% { 
        transform: scale(1.02);
        box-shadow: 6px 6px 0px #000000;
      }
    }
    
    .section-divider {
      border-top: 2px dashed #808080;
      position: relative;
      margin: 1.5rem 0;
    }
    
    .section-divider::before {
      content: '';
      position: absolute;
      top: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 12px;
      height: 12px;
      background: #FFFFFF;
      border: 2px solid #808080;
      border-radius: 50%;
    }
    
    .form-group {
      transition: all 0.3s ease;
    }
    
    .form-group:hover {
      transform: translateY(-1px);
    }
    
    .enhanced-grid {
      gap: 1.5rem;
    }
    
    @media (max-width: 768px) {
      .card {
        margin-bottom: 1rem;
        padding: 1rem;
        box-shadow: 4px 4px 0px #000000;
      }
      
      .section-icon {
        width: 2rem;
        height: 2rem;
      }
      
      .button {
        padding: 0.5rem 1rem;
        font-size: 0.9rem;
      }
    }
    
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    
    input[type="number"] {
      -moz-appearance: textfield;
      appearance: textfield;
    }
  </style>
</head>
<body class="min-h-screen p-4 sm:p-8">
  <div class="container">
    <!-- Header Card -->
    <div class="card header-card">
      <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        <div>
          <h1 class="text-3xl sm:text-4xl font-bold text-black mb-2">
            Identificação de Produtos
          </h1>
          <p class="text-gray-600 text-sm sm:text-base">Sistema Inteligente de Identificação de Paletes</p>
        </div>
        <button onclick="window.open('products.html', 'popup', 'width=2000,height=900,top=10,left=200,scrollbars=no,resizable=no')" 
                class="button" 
                title="Abrir gerenciamento de produtos em uma nova janela">
          <span class="flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" role="img" aria-label="Ícone de configurações">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            Gerenciar Produtos
          </span>
        </button>
      </div>
    </div>

    <!-- Form Card -->
    <div class="card">
      <div class="space-y-6">
        <!-- Product Section -->
        <div class="space-y-4">
          <div class="flex items-center gap-3 mb-4">
            <div class="section-icon">
              <svg class="w-5 h-5 text-black" fill="none" stroke="black" viewBox="0 0 24 24" role="img" aria-label="Ícone de produto">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
              </svg>
            </div>
            <h3 class="text-lg font-semibold text-black">Informações do Produto</h3>
          </div>
          
          <div class="grid grid-cols-1 md:grid-cols-2 enhanced-grid">
            <div class="form-group space-y-2">
              <label class="block text-gray-600 text-sm font-medium">Código (PLU) <span class="text-red-500 text-xs ml-1"></span></label>
              <div class="relative">
                <input id="plu" type="text" placeholder="Digite o Código (PLU)" 
                       class="input font-mono" 
                       oninput="searchProduct()" 
                       autocomplete="off" 
                       autofocus>
                <div class="absolute right-4 top-1/2 transform -translate-y-1/2">
                  <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" role="img" aria-label="Ícone de busca">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m-3 7h.01M9 16H5v2m1-13H3v2h2m9-9v2m3 7h3"/>
                  </svg>
                </div>
              </div>
            </div>
            
            <div class="form-group space-y-2">
              <label class="block text-gray-600 text-sm font-medium">Descrição do Produto <span class="text-red-500 text-xs ml-1"></span></label>
              <div class="relative">
                <input id="description" type="text" placeholder="Digite a descrição do produto" 
                       class="input" 
                       oninput="updateManualDescription()" 
                       autocomplete="off">
                <div class="absolute right-4 top-1/2 transform -translate-y-1/2">
                  <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" role="img" aria-label="Ícone de descrição">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
                  </svg>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Dates Section -->
        <div class="space-y-4 section-divider pt-6">
          <div class="flex items-center gap-3 mb-4">
            <div class="section-icon">
              <svg class="w-5 h-5 text-black" fill="none" stroke="black" viewBox="0 0 24 24" role="img" aria-label="Ícone de calendário">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
              </svg>
            </div>
            <h3 class="text-lg font-semibold text-black">Controle de Datas</h3>
          </div>
          
          <div class="grid grid-cols-1 md:grid-cols-2 enhanced-grid">
            <div class="form-group space-y-2">
              <label class="block text-gray-600 text-sm font-medium">
                Data de Recebimento
                <span class="text-gray-400 text-xs ml-1">(Opcional)</span>
              </label>
              <div class="relative">
                <input id="date" type="text" placeholder="dd/mm/aa" 
                       class="input date-input" 
                       autocomplete="off">
                <div class="absolute right-4 top-1/2 transform -translate-y-1/2">
                  <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" role="img" aria-label="Ícone de calendário">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                  </svg>
                </div>
              </div>
            </div>
            
            <div class="form-group space-y-2">
              <label class="block text-gray-600 text-sm font-medium">
                Data de Validade
                <span class="text-red-500 text-xs ml-1">*</span>
              </label>
              <div class="relative">
                <input id="validade" type="text" placeholder="dd/mm/aa" 
                       class="input date-input" 
                       autocomplete="off">
                <div class="absolute right-4 top-1/2 transform -translate-y-1/2">
                  <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" role="img" aria-label="Ícone de calendário">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                  </svg>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Print Section -->
        <div class="space-y-4 section-divider pt-6">
          <div class="flex items-center gap-3 mb-4">
            <div class="section-icon">
              <svg class="w-5 h-5 text-black" fill="none" stroke="black" viewBox="0 0 24 24" role="img" aria-label="Ícone de impressão">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/>
              </svg>
            </div>
            <h3 class="text-lg font-semibold text-black">Configuração de Impressão</h3>
          </div>
          
          <div class="grid grid-cols-1 md:grid-cols-2 enhanced-grid items-end">
            <div class="form-group space-y-2">
              <label class="block text-gray-600 text-sm font-medium">Quantidade de Cópias<span class="text-red-500 text-xs ml-1">*</span></label>
              <div class="relative">
                <input id="copies" type="number" placeholder="Digite o Número de Cópias Desejadas" min="1" 
                       class="input">
                <div class="absolute right-4 top-1/2 transform -translate-y-1/2 pointer-events-none">
                  <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" role="img" aria-label="Ícone de cópias">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v-2h8v2m0 0v2h2V3a1 1 0 00-1-1H7a1 1 0 00-1 1v6h2V7m0 0h2m-2 4h6v8H9v-8z"/>
                  </svg>
                </div>
              </div>
            </div>
            
            <button onclick="generatePrint()" 
                    class="button" 
                    id="printButton" 
                    title="Imprimir etiquetas (atalho: Enter)">
              <span class="flex items-center justify-center gap-3">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" role="img" aria-label="Ícone de impressão">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/>
                </svg>
                <span id="printButtonText">Imprimir Folhas</span>
              </span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Status Message -->
    <div id="statusMessage" class="fixed bottom-6 right-6 px-6 py-4 rounded-2xl shadow-xl
                                  transform translate-y-full opacity-0 transition-all duration-500 z-50 max-w-sm">
    </div>
  </div>

  <script>
    // Configurações globais
    const STATUS_MESSAGE_DURATIONS = {
      success: 2000,
      error: 3000,
      warning: 5000,
      info: 3000
    };
    const MAX_COPIES = 100;

    // Inicializar máscara de data com Cleave.js
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof Cleave === 'undefined') {
        console.error('Cleave.js não foi carregado. Máscaras de data não estarão disponíveis.');
        showStatusMessage('Erro ao carregar biblioteca de formatação de datas!', 'error', STATUS_MESSAGE_DURATIONS.error);
        return;
      }
      new Cleave('#date', {
        date: true,
        delimiter: '/',
        datePattern: ['d', 'm', 'y']
      });
      new Cleave('#validade', {
        date: true,
        delimiter: '/',
        datePattern: ['d', 'm', 'y']
      });
    });

    // Adicionar atalho de teclado para impressão
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && document.activeElement.tagName !== 'INPUT') {
        generatePrint();
      }
    });

    // Formatar data com validação robusta
    function formatDate(dateStr) {
      if (!dateStr || !/^\d{2}\/\d{2}\/\d{2,4}$/.test(dateStr)) return 'N/A';
      try {
        const [day, month, year] = dateStr.split('/');
        if (parseInt(day) > 31 || parseInt(month) > 12) return 'N/A';
        return `${day.padStart(2, '0')}/${month.padStart(2, '0')}/${year}`;
      } catch (error) {
        console.error('Erro ao formatar data:', error);
        return 'N/A';
      }
    }

    // Capitalizar palavras
    function capitalizeWords(str) {
      if (!str) return '';
      return str.toLowerCase().replace(/(^|\s)\w/g, char => char.toUpperCase());
    }

    // Exibir mensagem de status
    function showStatusMessage(message, type = 'info', duration = STATUS_MESSAGE_DURATIONS[type]) {
      const statusEl = document.getElementById('statusMessage');
      const colors = {
        success: 'bg-green-500/90 text-white border border-green-400/50',
        error: 'bg-red-500/90 text-white border border-red-400/50',
        warning: 'bg-amber-500/90 text-white border border-amber-400/50',
        info: 'bg-blue-500/90 text-white border border-blue-400/50'
      };
      
      const icons = {
        success: `<svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" role="img" aria-label="Ícone de sucesso">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                  </svg>`,
        error: `<svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" role="img" aria-label="Ícone de erro">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>`,
        warning: `<svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" role="img" aria-label="Ícone de aviso">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                  </svg>`,
        info: `<svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" role="img" aria-label="Ícone de informação">
                 <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
               </svg>`
      };
      
      statusEl.innerHTML = `
        <div class="flex items-center gap-3">
          ${icons[type]}
          <span class="text-sm font-medium">${message}</span>
        </div>
      `;
      statusEl.className = `fixed bottom-6 right-6 px-6 py-4 rounded-2xl shadow-xl
                           transform transition-all duration-500 z-50 max-w-sm ${colors[type]}`;
      
      setTimeout(() => {
        statusEl.style.transform = 'translateY(0)';
        statusEl.style.opacity = '1';
      }, 100);
      
      setTimeout(() => {
        statusEl.style.transform = 'translateY(100%)';
        statusEl.style.opacity = '0';
      }, duration);
    }

    let manualDescription = '';
    let lastPlu = '';

    // Atualizar descrição manual do produto
    function updateManualDescription() {
      try {
        const descriptionInput = document.getElementById('description');
        if (!descriptionInput.hasAttribute('readonly')) {
          manualDescription = descriptionInput.value;
          descriptionInput.value = capitalizeWords(manualDescription);
          console.log('Descrição manual atualizada:', manualDescription);
        }
      } catch (error) {
        console.error('Erro ao atualizar descrição manual:', error);
      }
    }

    // Buscar produto no localStorage com base no PLU
    function searchProduct() {
      try {
        const plu = document.getElementById('plu').value.trim();
        const descriptionInput = document.getElementById('description');

        if (plu === lastPlu) {
          console.log('PLU não mudou, preservando descrição');
          return;
        }

        const products = JSON.parse(localStorage.getItem('products') || '[]');
        const product = products.find(p => p.plu === plu);

        if (product) {
          manualDescription = '';
          descriptionInput.value = capitalizeWords(product.description);
          descriptionInput.setAttribute('readonly', 'readonly');
          descriptionInput.classList.add('input-readonly');
          showStatusMessage('Produto encontrado!', 'success', STATUS_MESSAGE_DURATIONS.success);
        } else {
          descriptionInput.removeAttribute('readonly');
          descriptionInput.classList.remove('input-readonly');
          descriptionInput.value = capitalizeWords(manualDescription);
          if (plu) {
            showStatusMessage('PLU não encontrado! Digite a descrição manualmente.', 'warning', STATUS_MESSAGE_DURATIONS.warning);
          }
        }
        lastPlu = plu;
      } catch (error) {
        console.error('Erro em searchProduct:', error);
        showStatusMessage('Erro ao buscar produto!', 'error', STATUS_MESSAGE_DURATIONS.error);
      }
    }

    // Gerar impressão de etiquetas
    function generatePrint() {
      try {
        const plu = document.getElementById('plu').value.trim();
        const description = document.getElementById('description').value.trim();
        const date = document.getElementById('date').value;
        const validade = document.getElementById('validade').value;
        const totalCopiesInput = document.getElementById('copies').value.trim();
        const totalCopies = parseInt(totalCopiesInput);
        const printButton = document.getElementById('printButton');
        const printButtonText = document.getElementById('printButtonText');

        console.log('Dados para impressão:', { plu, description, date, validade, totalCopies });

        let errorMessages = [];
        if (!plu) errorMessages.push('Código (PLU)');
        if (!description) errorMessages.push('Descrição do Produto');
        if (!validade) errorMessages.push('Data de Validade');
        if (totalCopiesInput === '' || isNaN(totalCopies) || totalCopies <= 0 || totalCopies > MAX_COPIES) {
          errorMessages.push(`Quantidade de Cópias (informe um número entre 1 e ${MAX_COPIES})`);
        }

        if (errorMessages.length > 0) {
          showStatusMessage(`Erro: ${errorMessages.join(', ')}!`, 'error', STATUS_MESSAGE_DURATIONS.error);
          console.log('Erro de validação:', errorMessages);
          return;
        }

        printButton.classList.add('pulse-printing');
        printButtonText.textContent = 'Processando...';

        setTimeout(() => {
          const printWindow = window.open('', '_blank');
          if (!printWindow) {
            showStatusMessage('O pop-up de impressão foi bloqueado. Habilite pop-ups para este site e tente novamente.', 'error', STATUS_MESSAGE_DURATIONS.error);
            printButton.classList.remove('pulse-printing');
            printButtonText.textContent = 'Imprimir Folhas';
            console.error('Erro: Janela de impressão não abriu');
            return;
          }

          const capitalizedDescription = capitalizeWords(description);
          const hasDate = !!date;
          const printContent = hasDate
            ? `
                <div class="print-page">
                  <div class="page-content">
                    <div class="item">${capitalizedDescription}</div>
                    <div class="plu">PLU: ${plu}</div>
                    <div class="label">DATA DE RECEBIMENTO:</div>
                    <div class="value">${formatDate(date)}</div>
                    <div class="label">DATA DE VALIDADE:</div>
                    <div class="value">${formatDate(validade)}</div>
                  </div>
                </div>
              `
            : `
                <div class="print-page">
                  <div class="page-content">
                    <div class="item">${capitalizedDescription}</div>
                    <div class="plu">PLU: ${plu}</div>
                    <div class="label">DATA DE VALIDADE:</div>
                    <div class="value">${formatDate(validade)}</div>
                  </div>
                </div>
              `;

          printWindow.document.write(`
            <html>
              <head>
                <meta charset="UTF-8">
                <title>Impressão de Etiquetas</title>
                <style>
                  @page {
                    size: A4 portrait;
                    margin: 5mm;
                  }
                  body {
                    margin: 0;
                    padding: 0;
                    background: white;
                    font-family: Arial, sans-serif;
                    box-sizing: border-box;
                  }
                  .print-page {
                    width: 210mm;
                    height: 297mm;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    page-break-after: always;
                    box-sizing: border-box;
                  }
                  .page-content {
                    width: 100%;
                    min-height: ${hasDate ? '287mm' : '267mm'};
                    display: flex;
                    flex-direction: column;
                    justify-content: center;
                    align-items: center;
                    text-align: center;
                    padding: 5mm;
                    box-sizing: border-box;
                  }
                  .item {
                    font-size: 48pt;
                    font-weight: bold;
                    margin-bottom: 20mm;
                    word-break: break-word;
                    max-width: 90%;
                  }
                  .plu {
                    font-size: 46pt;
                    margin-bottom: 20mm;
                  }
                  .label {
                    font-size: 36pt;
                    margin-bottom: 3mm;
                    text-transform: uppercase;
                  }
                  .value {
                    font-size: 36pt;
                    font-weight: bold;
                    margin-bottom: ${hasDate ? '20mm' : '30mm'};
                  }
                </style>
              </head>
              <body onload="window.print(); window.close();">
                ${Array(totalCopies).fill(0).map(() => printContent).join('')}
              </body>
            </html>
          `);

          printWindow.document.close();
          showStatusMessage(`${totalCopies} etiqueta(s) enviada(s) para impressão!`, 'success', STATUS_MESSAGE_DURATIONS.success);

          // Limpar os campos após a impressão
          document.getElementById('date').value = '';
          document.getElementById('validade').value = '';
          document.getElementById('plu').value = '';
          document.getElementById('description').value = '';
          document.getElementById('copies').value = '';
          document.getElementById('description').removeAttribute('readonly');
          document.getElementById('description').classList.remove('input-readonly');
          lastPlu = '';

          setTimeout(() => {
            showStatusMessage('Pronto para novo registro', 'info', STATUS_MESSAGE_DURATIONS.info);
            printButton.classList.remove('pulse-printing');
            printButtonText.textContent = 'Imprimir Folhas';
          }, STATUS_MESSAGE_DURATIONS.success);
          console.log('Impressão enviada com sucesso');
        }, 1000);

      } catch (error) {
        console.error('Erro em generatePrint:', error);
        showStatusMessage('Erro ao preparar impressão!', 'error', STATUS_MESSAGE_DURATIONS.error);
        printButton.classList.remove('pulse-printing');
        printButtonText.textContent = 'Imprimir Folhas';
      }
    }
  </script>
</body>
</html>
