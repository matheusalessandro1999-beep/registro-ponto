<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<script>!function(){try{var t=localStorage.getItem("rh_theme");if(t&&JSON.parse(t)==="light"){document.documentElement.classList.add("light-theme");document.documentElement.style.colorScheme="light";}}catch(e){}}();</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absenteísmo · RH Nagumo</title>
<link rel="stylesheet" href="../sidebar.css">
<link rel="stylesheet" href="../base.css">
<link rel="stylesheet" href="../light-theme.css">
<link rel="stylesheet" href="../responsive.css">
<script src="../lib/chart.umd.min.js" defer></script>
<script src="../db-local.js"></script>
<script src="../permissions.js"></script>
<script src="../shared.js"></script>
<link rel="stylesheet" href="absenteeism.css">
<script src="absenteeism.js"></script>
</head>
<body class="sb-collapsed">
<style>#loading-screen{position:fixed;inset:0;z-index:999999;background:#0b0d14;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif}#loading-screen.hide{display:none}.load-spinner{width:36px;height:36px;border:3px solid #2a2f45;border-top-color:#4f8ef7;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.load-text{color:#94a3b8;font-size:13px;margin-top:16px;letter-spacing:.5px}</style>
<div id="loading-screen"><div class="load-spinner"></div><div class="load-text">Carregando...</div></div>


<div class="toast-container" id="toast-container"></div>
<nav id="app-sidebar"></nav>
<script>!function(){try{var c=localStorage.getItem('rh_sb_cache_v2');if(c)document.getElementById('app-sidebar').innerHTML=c;}catch(e){}}();</script>

<main class="main">

  <!-- Topbar -->
  <div class="topbar">
    <div>
      <div class="page-title">Absenteísmo <span>Análise</span></div>
      <div class="page-date" id="abs-date"></div>
    </div>
    <button class="btn-export" onclick="exportarRelatorio()">📋 Exportar Relatório</button>
  </div>

  <!-- Filtros -->
  <div class="filter-row">
    <select class="filter-select" id="filter-ano" onchange="renderAll()">
      <!-- preenchido pelo JS -->
    </select>
    <select class="filter-select" id="filter-mes" onchange="renderAll()">
      <!-- preenchido pelo JS -->
    </select>
    <select class="filter-select" id="filter-filial" onchange="renderAll()">
      <option value="">Todas as filiais</option>
    </select>
    <select class="filter-select" id="filter-dept" onchange="renderAll()">
      <option value="">Todos os departamentos</option>
    </select>
    <select class="filter-select" id="filter-turno" onchange="renderAll()">
      <option value="">Todos os turnos</option>
    </select>
  </div>

  <!-- KPIs -->
  <div class="kpi-row" id="kpi-row"></div>

  <!-- Gráfico + Heatmap -->
  <div class="main-row">
    <div class="card">
      <div class="card-title">
        Faltas por Mês
        <span class="card-badge red">Últimos 12 meses</span>
      </div>
      <div class="chart-wrap"><canvas id="chart-barras"></canvas></div>
    </div>
    <div class="card">
      <div class="heatmap-title" id="heatmap-title">Heatmap Mensal</div>
      <div class="heatmap-sub">Dia da Semana</div>
      <div class="heat-day-header" style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px">
        <div class="heat-day-label">Dom</div>
        <div class="heat-day-label">Seg</div>
        <div class="heat-day-label">Ter</div>
        <div class="heat-day-label">Qua</div>
        <div class="heat-day-label">Qui</div>
        <div class="heat-day-label">Sex</div>
        <div class="heat-day-label">Sáb</div>
      </div>
      <div class="heatmap-days" id="heatmap-days"></div>
      <div class="heat-legend">
        <div class="heat-legend-item"><div class="heat-dot" style="background:#34d399"></div> Baixo</div>
        <div class="heat-legend-item"><div class="heat-dot" style="background:#fbbf24"></div> Médio</div>
        <div class="heat-legend-item"><div class="heat-dot" style="background:#f87171"></div> Alto</div>
      </div>
    </div>
  </div>

  <!-- Tabela top faltosos -->
  <div class="card">
    <div class="card-title">
      Top Faltosos do Mês
      <span class="card-badge accent" id="badge-mes-atual"></span>
    </div>
    <div style="overflow-x:auto">
      <table class="abs-table">
        <thead>
          <tr>
            <th>Funcionário</th>
            <th>Departamento</th>
            <th>Faltas</th>
            <th>% Período</th>
            <th>Tendência</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="abs-table-body"></tbody>
      </table>
    </div>
  </div>

</main>

</body>
</html>
