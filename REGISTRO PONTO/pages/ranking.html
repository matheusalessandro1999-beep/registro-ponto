<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<script>!function(){try{var t=localStorage.getItem("rh_theme");if(t&&JSON.parse(t)==="light"){document.documentElement.classList.add("light-theme");document.documentElement.style.colorScheme="light";}}catch(e){}}();</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking · RH Nagumo</title>
<link rel="stylesheet" href="../sidebar.css">
<link rel="stylesheet" href="../base.css">
<link rel="stylesheet" href="../light-theme.css">
<link rel="stylesheet" href="../responsive.css">
<link rel="stylesheet" href="ranking.css">
<script src="../db-local.js"></script>
<script src="../permissions.js"></script>
<script src="../shared.js"></script>
<script src="ranking.js"></script>
</head>
<body class="sb-collapsed">
<style>#loading-screen{position:fixed;inset:0;z-index:999999;background:#0b0d14;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif}#loading-screen.hide{display:none}.load-spinner{width:36px;height:36px;border:3px solid #2a2f45;border-top-color:#4f8ef7;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.load-text{color:#94a3b8;font-size:13px;margin-top:16px;letter-spacing:.5px}</style>
<div id="loading-screen"><div class="load-spinner"></div><div class="load-text">Carregando...</div></div>


<div class="toast-container" id="toast-container"></div>
<nav id="app-sidebar"></nav>
<script>!function(){try{var c=localStorage.getItem('rh_sb_cache_v2');if(c)document.getElementById('app-sidebar').innerHTML=c;}catch(e){}}();</script>

<main class="main">

  <!-- Topbar -->
  <div class="topbar">
    <div class="page-title">Ranking <span>Geral</span></div>
    <div class="page-subtitle" id="rank-subtitle"></div>
  </div>

  <!-- Filtros -->
  <div class="filter-row">
    <select class="filter-select" id="filter-filial" onchange="renderRanking()">
      <option value="">Todas as filiais</option>
    </select>
    <select class="filter-select" id="filter-dept" onchange="renderRanking()"></select>
    <select class="filter-select" id="filter-turno" onchange="renderRanking()">
      <option value="">Todos os turnos</option>
    </select>
    <select class="filter-select" id="filter-ano" onchange="renderRanking()">
      <!-- anos preenchidos pelo JS -->
    </select>
    <select class="filter-select" id="filter-mes" onchange="renderRanking()">
      <!-- meses preenchidos pelo JS -->
    </select>
    <div class="sort-chip active" data-sort="score"    onclick="setSort(this,'score')">Score Geral</div>
    <div class="sort-chip"        data-sort="perf"     onclick="setSort(this,'perf')">Desempenho</div>
    <div class="sort-chip"        data-sort="apt"      onclick="setSort(this,'apt')">Aptidões</div>
    <div class="sort-chip"        data-sort="assid"    onclick="setSort(this,'assid')">Assiduidade</div>
  </div>

  <!-- Pódio Top 3 -->
  <div class="podium-row" id="podium-row"></div>

  <!-- Tabela ranking completo -->
  <div class="ranking-section">
    <div class="ranking-header">
      <div class="ranking-title">Ranking Completo</div>
      <div class="ranking-badge" id="ranking-badge">0 funcionários</div>
    </div>
    <div class="rank-table-wrap">
      <table class="rank-table">
        <thead>
          <tr>
            <th style="width:40px">#</th>
            <th onclick="toggleSort('name')">
              Funcionário <span class="sort-icon" id="si-name">↕</span>
            </th>
            <th onclick="toggleSort('score')">Score <span class="sort-icon" id="si-score">↓</span></th>
            <th onclick="toggleSort('perf')">Desemp. <span class="sort-icon" id="si-perf">↕</span></th>
            <th onclick="toggleSort('apt')">Apt. <span class="sort-icon" id="si-apt">↕</span></th>
            <th onclick="toggleSort('assid')">Assid. <span class="sort-icon" id="si-assid">↕</span></th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="rank-tbody"></tbody>
      </table>
    </div>
  </div>

</main>

<div id="pilar-tooltip"></div>
</body>
</html>
