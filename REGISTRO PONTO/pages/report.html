<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<script>!function(){try{var t=localStorage.getItem("rh_theme");if(t&&JSON.parse(t)==="light"){document.documentElement.classList.add("light-theme");document.documentElement.style.colorScheme="light";}}catch(e){}}();</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório · RH Nagumo</title>
<link rel="stylesheet" href="../sidebar.css">
<link rel="stylesheet" href="../base.css">
<link rel="stylesheet" href="../light-theme.css">
<link rel="stylesheet" href="../responsive.css">
<link rel="stylesheet" href="report.css">
<script src="../db-local.js"></script>
<script src="../permissions.js"></script>
<script src="../shared.js"></script>
<script src="report.js"></script>
</head>
<body class="sb-collapsed">
<style>#loading-screen{position:fixed;inset:0;z-index:999999;background:#0b0d14;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif}#loading-screen.hide{display:none}.load-spinner{width:36px;height:36px;border:3px solid #2a2f45;border-top-color:#4f8ef7;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.load-text{color:#94a3b8;font-size:13px;margin-top:16px;letter-spacing:.5px}</style>
<div id="loading-screen"><div class="load-spinner"></div><div class="load-text">Carregando...</div></div>


<div class="toast-container" id="toast-container"></div>
<nav id="app-sidebar"></nav>
<script>!function(){try{var c=localStorage.getItem('rh_sb_cache_v2');if(c)document.getElementById('app-sidebar').innerHTML=c;}catch(e){}}();</script>

<main class="main">

  <div class="topbar">
    <div>
      <div class="page-title">📄 Relatório <span>Desempenho</span></div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px">Configure e gere o relatório para impressão ou PDF</div>
    </div>
  </div>

  <div class="config-card">
    <div class="config-title">⚙️ Configurar Relatório</div>
    <div class="config-grid">
      <div class="form-group">
        <label class="form-label">📅 Período — De</label>
        <select class="form-select" id="cfg-mes-de">
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">📅 Período — Até</label>
        <select class="form-select" id="cfg-mes-ate">
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">🏢 Departamento</label>
        <select class="form-select" id="cfg-dept">
          <option value="">Todos (geral)</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">🏭 Filial</label>
        <select class="form-select" id="cfg-filial">
          <option value="">Todas</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">👤 Funcionário</label>
        <select class="form-select" id="cfg-employee">
          <option value="">Todos (geral)</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">📊 Ordenar por</label>
        <select class="form-select" id="cfg-sort">
          <option value="score">Score Geral</option>
          <option value="perf">Desempenho</option>
          <option value="apt">Aptidões</option>
          <option value="assid">Assiduidade</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">🔢 Limite de funcionários</label>
        <select class="form-select" id="cfg-limite">
          <option value="10">Top 10</option>
          <option value="20">Top 20</option>
          <option value="50">Top 50</option>
          <option value="0">Todos</option>
        </select>
      </div>
    </div>
  </div>

  <div class="btn-row-outer" style="margin-bottom:20px">
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-gerar" onclick="gerarRelatorio()">🔄 Gerar Relatório</button>
      <button class="btn btn-ghost"   onclick="imprimirRelatorio()">🖨️ Imprimir / Salvar PDF</button>
    </div>
  </div>

  <div class="preview-label" style="font-size:11px;color:var(--muted);margin-bottom:10px;letter-spacing:.5px">
    PRÉ-VISUALIZAÇÃO · Formato A4
  </div>
  <div class="preview-wrap">
    <div class="doc-a4" id="doc-a4">
      <div style="text-align:center;padding:60px 20px;color:#94a3b8;font-size:14px">
        Configure os parâmetros acima e clique em <strong style="color:#2563eb">Gerar Relatório</strong>
      </div>
    </div>
  </div>

</main>

</body>
</html>
