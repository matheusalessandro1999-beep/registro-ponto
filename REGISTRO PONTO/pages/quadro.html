<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<script>!function(){try{var t=localStorage.getItem("rh_theme");if(t&&JSON.parse(t)==="light"){document.documentElement.classList.add("light-theme");document.documentElement.style.colorScheme="light";}}catch(e){}}();</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quadro Operacional · RH Nagumo</title>
<link rel="stylesheet" href="../sidebar.css">
<link rel="stylesheet" href="../base.css">
<link rel="stylesheet" href="../light-theme.css">
<link rel="stylesheet" href="../responsive.css">
<link rel="stylesheet" href="quadro.css">
<script src="../db-local.js"></script>
<script src="../permissions.js"></script>
<script src="../shared.js"></script>
<script src="quadro.js"></script>
</head>
<body class="sb-collapsed">
<style>#loading-screen{position:fixed;inset:0;z-index:999999;background:#0b0d14;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif}#loading-screen.hide{display:none}.load-spinner{width:36px;height:36px;border:3px solid #2a2f45;border-top-color:#4f8ef7;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.load-text{color:#94a3b8;font-size:13px;margin-top:16px;letter-spacing:.5px}</style>
<div id="loading-screen"><div class="load-spinner"></div><div class="load-text">Carregando...</div></div>


<div class="toast-container" id="toast-container"></div>
<nav id="app-sidebar"></nav>
<script>!function(){try{var c=localStorage.getItem('rh_sb_cache_v2');if(c)document.getElementById('app-sidebar').innerHTML=c;}catch(e){}}();</script>

<main class="main">

  <!-- Topbar -->
  <div class="topbar">
    <div>
      <div class="page-title">📋 Quadro <span>Operacional</span></div>
      <div class="page-sub" id="quadro-sub">Selecione uma filial</div>
    </div>
    <button class="btn-save" id="btn-salvar" onclick="salvarQuadro()" disabled style="display:none">
      💾 Salvar Vagas
    </button>
  </div>

  <!-- Seletor de filiais -->
  <div class="filial-row" id="filial-row"></div>

  <!-- Tab Bar -->
  <div class="tab-bar" id="tab-bar" style="display:none">
    <button class="tab-btn tab-quadro active" id="tab-btn-quadro" onclick="setTab('quadro')">
      📋 Quadro Operacional
    </button>
    <button class="tab-btn tab-vagas" id="tab-btn-vagas" onclick="setTab('vagas')" style="display:none">
      ⚙️ Gestão de Vagas
      <span class="tab-lock">🔒 Gestor</span>
    </button>
  </div>

  <!-- Conteúdo dinâmico -->
  <div id="quadro-content"></div>
  <div id="vagas-content" style="display:none"></div>

</main>

</body>
</html>
