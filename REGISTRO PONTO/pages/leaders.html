<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<script>!function(){try{var t=localStorage.getItem("rh_theme");if(t&&JSON.parse(t)==="light"){document.documentElement.classList.add("light-theme");document.documentElement.style.colorScheme="light";}}catch(e){}}();</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organograma · RH Nagumo</title>
<link rel="stylesheet" href="../base.css">
<link rel="stylesheet" href="../sidebar.css">
<link rel="stylesheet" href="../light-theme.css">
<link rel="stylesheet" href="../responsive.css">
<link rel="stylesheet" href="leaders.css">
<script src="../db-local.js"></script>
<script src="../permissions.js"></script>
<script src="../shared.js"></script>
</head>
<body class="sb-collapsed">
<style>#loading-screen{position:fixed;inset:0;z-index:999999;background:#0b0d14;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif}#loading-screen.hide{display:none}.load-spinner{width:36px;height:36px;border:3px solid #2a2f45;border-top-color:#4f8ef7;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.load-text{color:#94a3b8;font-size:13px;margin-top:16px;letter-spacing:.5px}</style>
<div id="loading-screen"><div class="load-spinner"></div><div class="load-text">Carregando...</div></div>


<div class="toast-cnt" id="toast-cnt"></div>
<nav id="app-sidebar"></nav>
<script>!function(){try{var c=localStorage.getItem('rh_sb_cache_v2');if(c)document.getElementById('app-sidebar').innerHTML=c;}catch(e){}}();</script>

<main class="main">

  <!-- Topbar -->
  <div class="topbar">
    <div class="page-title">👔 Organograma</div>
  </div>

  <!-- Filtro -->
  <div class="filter-bar">
    <div class="leader-select-wrap">
      <select class="leader-select" id="ldr-select">
        <option value="">👥 Todos os líderes</option>
      </select>
    </div>
    <div class="filter-count" id="filter-count">—</div>
    <button class="btn btn-ghost btn-sm" id="toggle-demitidos" style="display:none;margin-left:auto">🔴 Ex-líderes</button>
  </div>

  <!-- Grid de cards -->
  <div class="leaders-grid" id="leaders-grid"></div>

</main>

<!-- ══ MODAL ÁRVORE HIERÁRQUICA ══ -->
<div class="ov" id="ov-org">
  <div class="modal-tree">
    <div class="modal-tree-header">
      <div class="modal-tree-avatar" id="tree-header-avatar"></div>
      <div class="modal-tree-info">
        <div class="modal-tree-name" id="tree-modal-name">Hierarquia</div>
        <div class="modal-tree-sub"  id="tree-modal-sub">Árvore de responsabilidades</div>
      </div>
      <button class="modal-tree-close" id="tree-close-btn">✕ Fechar</button>
    </div>
    <div class="tree-breadcrumb" id="tree-breadcrumb"></div>
    <div class="modal-tree-body" id="tree-modal-body"></div>
  </div>
</div>

<!-- ══ MODAL NOVO/EDITAR LÍDER ══ -->
<div class="ov2" id="ov-edit" role="dialog" aria-modal="true" aria-label="Editar líder">
  <div class="modal">
    <div class="modal-title" id="edit-title">Novo Líder</div>
    <div class="form-grid">
      <div class="form-group full">
        <label class="form-label">📷 Foto do Líder</label>
        <div class="foto-wrap">
          <div class="foto-prev" id="foto-prev"><span id="foto-ini">?</span></div>
          <div class="foto-btns">
            <input type="file" id="foto-input" accept="image/*" style="display:none">
            <button type="button" class="btn-foto" id="btn-select-foto">📷 Selecionar foto</button>
            <button type="button" class="btn-foto rm" id="btn-rm-foto">✕ Remover</button>
          </div>
        </div>
      </div>
      <div class="form-group full">
        <label class="form-label">👤 Nome Completo</label>
        <input class="form-input" type="text" id="f-name" placeholder="Ex: Roberto Carlos">
      </div>
      <div class="form-group full">
        <label class="form-label">🪪 ID de Acesso (login)</label>
        <input class="form-input" type="text" id="f-id" placeholder="Ex: roberto ou (11)99999" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">🪪 Matrícula</label>
        <input class="form-input" type="text" id="f-matricula" placeholder="Apenas números, máx. 6 dígitos" maxlength="6">
      </div>
      <div class="form-group">
        <label class="form-label">📅 Data de Admissão</label>
        <input class="form-input" type="date" id="f-data-admissao">
      </div>
      <div class="form-group">
        <label class="form-label">💼 Cargo / Função</label>
        <input class="form-input" type="text" id="f-role" placeholder="Ex: Supervisor">
      </div>
      <div class="form-group">
        <label class="form-label">🏅 Nível</label>
        <select class="form-input" id="f-nivel">
          <option value="lider">👷 Líder Operacional</option>
          <option value="encarregado">🔰 Encarregado</option>
          <option value="coordenacao">📋 Coordenação</option>
          <option value="gerencia">📊 Gerência</option>
          <option value="diretoria">🏢 Diretoria</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">🏭 Filiais que gerencia</label>
        <div class="check-list" id="f-filiais-list"></div>
      </div>
      <div class="form-group">
        <label class="form-label">🕐 Turnos que gerencia</label>
        <div class="check-list" id="f-turnos-list"></div>
      </div>
      <div class="form-group full">
        <label class="form-label">🏢 Departamentos que gerencia</label>
        <div class="check-list" id="f-depts-list"></div>
      </div>
      <div class="form-group" id="pass-wrap">
        <label class="form-label">🔑 Senha inicial</label>
        <input class="form-input" type="password" id="f-pass" placeholder="Mín. 6 caracteres" autocomplete="new-password">
      </div>
    </div>
    <div class="form-divider"></div>
    <div class="form-group" id="demissao-section" style="display:none">
      <label class="form-label" style="color:var(--red)">🔴 Demissão</label>
      <div style="display:flex;flex-direction:column;gap:8px;margin-top:4px">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px">
          <input type="checkbox" id="f-demitido" style="accent-color:var(--red);width:16px;height:16px">
          Líder desligado
        </label>
        <div id="demitido-date-wrap" style="display:none;flex-direction:column;gap:6px">
          <input class="form-input" type="date" id="f-data-demissao" style="max-width:200px">
          <input class="form-input" type="text" id="f-motivo-demissao" placeholder="Motivo do desligamento">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="btn-cancel-edit">Cancelar</button>
      <button class="btn btn-primary" id="btn-save-leader">💾 Salvar</button>
    </div>
    <input type="hidden" id="f-edit-id">
    <input type="hidden" id="f-foto">
  </div>
</div>

<!-- ══ MODAL OCORRÊNCIA ══ -->
<div class="ov2" id="ov-oc">
  <div class="modal">
    <div class="modal-title">📝 Registrar Ocorrência</div>
    <div class="oc-header" id="oc-header">
      🧑‍💼 Líder: <strong id="oc-name"></strong>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">📋 Tipo</label>
        <select class="form-input" id="oc-tipo">
          <option value="">— Selecione —</option>
          <option value="Justificativa">📄 Justificativa</option>
          <option value="Ajuste">🔧 Ajuste</option>
          <option value="Ocorrência">⚠️ Ocorrência</option>
          <option value="Entrada">🟢 Entrada</option>
          <option value="Saída">🔴 Saída</option>
          <option value="Advertência">🚨 Advertência</option>
          <option value="Elogio">⭐ Elogio</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">📅 Data</label>
        <input class="form-input" type="datetime-local" id="oc-data">
      </div>
      <div class="form-group full">
        <label class="form-label">📝 Descrição</label>
        <textarea class="form-input" id="oc-desc" rows="4" placeholder="Descreva a ocorrência..."></textarea>
      </div>
    </div>
    <input type="hidden" id="oc-id">
    <div class="modal-footer">
      <button class="btn btn-ghost" id="btn-cancel-oc">Cancelar</button>
      <button class="btn btn-primary" id="btn-save-oc">📝 Salvar Ocorrência</button>
    </div>
  </div>
</div>

<script src="leaders.js"></script>
</body>
</html>
