<style>
:root {
  --bg:#0b0d14; --surface:#12151f; --surface2:#1a1e2e; --surface3:#222638;
  --border:#2a2f45; --accent:#4f8ef7; --accent2:#a78bfa;
  --green:#34d399; --red:#f87171; --text:#ffffff; --muted:#94a3b8;
  --font-head:'Syne',sans-serif; --font-body:'DM Sans',sans-serif;
}
/* [light-theme.css] body.light-theme {
  --bg:#EEF2F8; --surface:#fff; --surface2:#F4F7FB; --surface3:#E8EDF5;
  --border:#D6DDE8; --accent:#2563eb; --green:#059669; --red:#dc2626;
  --text:#0f172a; --muted:#64748b;
} */
/* [light-theme.css] body.light-theme .login-box         { background:#fff; border-color:#E2E8F0; box-shadow:0 8px 40px rgba(15,23,42,.1); } */
/* [light-theme.css] body.light-theme .login-field input  { background:#F4F7FB; border-color:#CBD5E1; color:#0f172a; } */
/* [light-theme.css] body.light-theme .login-tab          { background:#F4F7FB; color:#64748b; } */
/* [light-theme.css] body.light-theme .login-tab.active   { background:#2563eb; color:#fff; } */
/* [light-theme.css] body.light-theme .login-tab-row      { border-color:#E2E8F0; } */
/* [light-theme.css] body.light-theme .login-admin-hint   { color:#94a3b8; } */

* { box-sizing:border-box; margin:0; padding:0; }
body {
  background:var(--bg); color:var(--text); font-family:var(--font-body);
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  padding:20px; overflow-y:auto;
}
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--surface); }
::-webkit-scrollbar-thumb { background:var(--surface3); border-radius:3px; }

.login-box {
  background:var(--surface); border:1px solid var(--border);
  border-radius:20px; padding:36px 40px;
  width:420px; max-width:95vw;
  box-shadow:0 24px 64px rgba(0,0,0,.5);
}
.login-logo { display:flex; flex-direction:column; align-items:center; padding-bottom:22px; gap:8px; }
.logo-wrap  { background:#12151F; border-radius:10px; padding:7px 14px; box-shadow:0 2px 8px rgba(0,0,0,.3); }
.logo-bg { background:#12151F; border-radius:10px; padding:5px 10px; overflow:hidden; box-shadow:0 2px 2px rgba(0,0,0,0.3); margin-bottom:10px; }
body.light-theme .logo-bg { background:transparent; box-shadow:none; }
.logo-wrap span { font-family:var(--font-head); font-size:22px; font-weight:800; color:#fff; letter-spacing:-1px; }
.login-subtitle { font-size:11px; color:var(--muted); letter-spacing:1px; }

.login-tab-row { display:flex; margin-bottom:22px; border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.login-tab { flex:1; padding:9px; text-align:center; font-size:12px; font-weight:600; cursor:pointer; transition:background .2s; color:var(--muted); background:var(--surface2); }
.login-tab.active { background:var(--accent); color:#fff; }

.login-field { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
.login-field label { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
.login-field input { padding:10px 13px; border-radius:9px; font-size:13px; background:var(--surface2); border:1px solid var(--border); color:var(--text); outline:none; transition:border-color .2s; font-family:var(--font-body); }
.login-field input:focus { border-color:var(--accent); }

.eye-btn { position:absolute; right:10px; cursor:pointer; color:#94a3b8; display:flex; align-items:center; transition:color .2s; }
.eye-btn:hover { color:var(--accent); }

.login-btn { width:100%; padding:11px; border-radius:10px; border:none; background:var(--accent); color:#fff; font-family:var(--font-head); font-size:14px; font-weight:700; cursor:pointer; transition:background .2s, transform .15s; margin-top:6px; }
.login-btn:hover { background:#3a7ae0; transform:translateY(-1px); }

.login-msg { text-align:center; font-size:12px; padding:8px 12px; border-radius:8px; margin-top:10px; display:none; }
.login-msg.error   { background:rgba(248,113,113,.15); color:var(--red);   display:block; }
.login-msg.success { background:rgba(52,211,153,.15);  color:var(--green); display:block; }
.login-msg.info    { background:rgba(79,142,247,.12);  color:var(--accent);display:block; }

.login-admin-hint { font-size:10px; color:var(--muted); text-align:center; margin-top:16px; cursor:pointer; text-decoration:underline dotted; }
.login-admin-hint:hover { color:var(--text); }

select {
  background:var(--surface2); border:1px solid var(--border); border-radius:9px;
  color:var(--text); font-family:var(--font-body); font-size:13px;
  padding:10px 13px; outline:none; width:100%;
}
.gestor-info { background:rgba(79,142,247,.08); border:1px solid rgba(79,142,247,.2); border-radius:10px; padding:10px 14px; font-size:12px; color:var(--muted); margin-bottom:10px; }

.toast-container { position:fixed; bottom:24px; right:24px; z-index:99999; display:flex; flex-direction:column; gap:8px; }
.toast { padding:10px 18px; border-radius:10px; font-size:12px; font-family:var(--font-body); box-shadow:0 4px 20px rgba(0,0,0,.4); animation:fadeUp .25s ease; max-width:320px; }
.toast.ok    { background:#0f2a1a; border:1px solid #22c55e; color:#86efac; }
.toast.warn  { background:#422006; border:1px solid #f97316; color:#fdba74; }
.toast.error { background:#2a0a0a; border:1px solid #f87171; color:#fca5a5; }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

.logo-dark  { display:block; }
.logo-light { display:none;  }
body.light-theme .logo-dark  { display:none;  }
body.light-theme .logo-light { display:block; }
</style>

<script>
let loginAttempts = 0;
let loginBlockedUntil = 0;

(async function init() {
  try { await ensureAdmin(); } catch(e) { console.error('[init] ensureAdmin error:', e); }
  initTheme();

  // Restaura bloqueio de tentativas persistido
  const blocked = LS_LOCAL.get('rh_login_blocked', 0);
  if (blocked > Date.now()) loginBlockedUntil = blocked;
  else LS_LOCAL.remove('rh_login_blocked');

  // Limpa sessão antiga do admin antigo ('admin')
  const oldSession = LS_LOCAL.get('rh_session');
  if (oldSession === 'admin') {
    LS_LOCAL.remove('rh_session');
    LS_LOCAL.remove('rh_last_activity');
  }

  // Já logado → verifica expiração (24h)
  const id    = LS_LOCAL.get('rh_session');
  if (id) {
    const lastAct = LS_LOCAL.get('rh_last_activity');
    if (lastAct && Date.now() - Number(lastAct) > 86400000) {
      LS_LOCAL.remove('rh_session');
      LS_LOCAL.remove('rh_last_activity');
    }
  }
  const store = await getStore();
  
  if (id && (store.users[id] || (store.employees||[]).find(e => e.login_id === id))) {
    window.location.href = 'index.html';
    return;
  }

  setTimeout(() => {
    const a = document.getElementById('li-id');
    const b = document.getElementById('li-pass');
    if (a) a.value = '';
    if (b) b.value = '';
  }, 100);
})();

function switchTab(tab) {
  document.getElementById('panel-login').style.display    = tab==='login'    ? 'block':'none';
  document.getElementById('panel-register').style.display = tab==='register' ? 'block':'none';
  document.getElementById('tab-login').classList.toggle('active',    tab==='login');
  document.getElementById('tab-register').classList.toggle('active', tab==='register');
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className   = 'login-msg ' + type;
}

function togglePass(id) {
  const el = document.getElementById(id);
  const btn = el.parentElement.querySelector('.eye-btn');
  if (el.type === 'password') {
    el.type = 'text';
    if (btn) btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
  } else {
    el.type = 'password';
    if (btn) btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
  }
}

async function doLogin() {
  if (Date.now() < loginBlockedUntil) {
    const secs = Math.ceil((loginBlockedUntil - Date.now()) / 1000);
    showMsg('login-msg', `⏳ Aguarde ${secs}s antes de tentar novamente.`, 'error');
    return;
  }
  const id   = document.getElementById('li-id').value.trim();
  const pass = document.getElementById('li-pass').value;
  if (!id || !pass) { showMsg('login-msg','⚠️ Preencha todos os campos.','error'); return; }
  if (!isValidEmail(id)) { showMsg('login-msg','⚠️ Informe um e-mail válido.','error'); return; }
  let store;
  try {
    store = await getStore();
  } catch(e) {
    showMsg('login-msg','📡 Falha de conexão. Verifique sua internet e tente novamente.','error');
    return;
  }
  let user  = store.users[id] || (store.employees||[]).find(e => e.login_id === id);
  if (!user) {
    loginAttempts++;
    if (loginAttempts >= 3) { loginBlockedUntil = Date.now() + 30000; loginAttempts = 0; LS_LOCAL.set('rh_login_blocked', loginBlockedUntil); showMsg('login-msg','⏳ Muitas tentativas. Tente novamente em 30s.','error'); return; }
    showMsg('login-msg','❌ Credenciais inválidas.','error');
    return;
  }
  const passOk = await checkPass(store, user.id || user.login_id, pass);
  if (!passOk) {
    if (user.pass === pass) {
      user.pass = await hashPassword(pass);
      await saveStore(store);
    } else {
      loginAttempts++;
      if (loginAttempts >= 3) { loginBlockedUntil = Date.now() + 30000; loginAttempts = 0; LS_LOCAL.set('rh_login_blocked', loginBlockedUntil); showMsg('login-msg','⏳ Muitas tentativas. Tente novamente em 30s.','error'); return; }
      showMsg('login-msg','❌ Credenciais inválidas.','error');
      return;
    }
  }
  loginAttempts = 0;
  LS_LOCAL.remove('rh_login_blocked');
  LS_LOCAL.set('rh_session', id);
  LS_LOCAL.set('rh_last_activity', Date.now());
  await registrarLog('login', 'Sistema', `Entrou no sistema`, user);
  setTimeout(() => { window.location.href = 'index.html'; }, 50);
}

async function doRegister() {
  const id    = document.getElementById('reg-id').value.trim();
  const name  = document.getElementById('reg-name').value.trim();
  const nivel = document.getElementById('reg-nivel').value;
  const pass  = document.getElementById('reg-pass').value;
  const pass2 = document.getElementById('reg-pass2').value;
  const auth  = document.getElementById('reg-auth').value;
  if (!id||!name||!nivel||!pass||!pass2||!auth) { showMsg('register-msg','⚠️ Preencha todos os campos.','error'); return; }
  if (!isValidEmail(id)) { showMsg('register-msg','⚠️ Informe um e-mail válido.','error'); return; }
  if (pass !== pass2) { showMsg('register-msg','❌ As senhas não coincidem.','error');         return; }
  if (pass.length < 6){ showMsg('register-msg','❌ Senha com mínimo 6 caracteres.','error');   return; }
  const store = await getStore();
  if (auth !== store.authCode) { showMsg('register-msg','❌ Código de autorização inválido.','error'); return; }
  if (store.users[id] || (store.employees||[]).find(e => e.login_id === id)) { showMsg('register-msg','❌ Este ID já está cadastrado.','error'); return; }
  let setor = '';
  if (nivel==='encarregado') {
    setor = document.getElementById('reg-setor').value;
    if (!setor) { showMsg('register-msg','⚠️ Selecione o setor.','error'); return; }
  }
  store.users[id] = { id, name, pass:await hashPassword(pass), nivel, setor, perfil:{ filial:'', turno:'', depts:[] } };
  await saveStore(store);
  showMsg('register-msg','✅ Cadastro realizado! Faça seu login.','success');
  setTimeout(() => switchTab('login'), 2000);
}

async function onNivelChange() {
  const nivel     = document.getElementById('reg-nivel').value;
  const setorWrap = document.getElementById('reg-setor-wrap');
  const gestorInf = document.getElementById('reg-gestor-info');
  setorWrap.style.display = 'none';
  gestorInf.style.display = 'none';
  if (nivel==='encarregado') {
    setorWrap.style.display = 'block';
    const sel   = document.getElementById('reg-setor');
    const store = await getStore();
    sel.innerHTML = '<option value="">— Selecione o setor —</option>' +
      store.depts.map(d=>`<option value="${d.nome}">${d.nome}</option>`).join('');
  } else if (['coordenacao','gerencia','diretoria'].includes(nivel)) {
    gestorInf.style.display = 'block';
  }
}

function isValidEmail(email) {
  const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  return re.test(email);
}
